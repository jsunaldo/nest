function renderCatsScreen(c){
  // Surface duplicate names — the usual cause of "money in a spending category".
  const byName = {};
  for (const cat of liveCats()){ const k = cat.name.trim().toLowerCase(); (byName[k] = byName[k] || []).push(cat); }
  const dupNames = Object.keys(byName).filter((k) => byName[k].length > 1);
  let html = '';
  if (dupNames.length){
    html += '<div class="card" style="border-color:var(--status-warn)"><h3>⚠️ Duplicate categories</h3>' +
      '<p class="muted" style="margin:0 0 8px">These names exist more than once (often one you made plus one Nest added). Open either and use <b>Merge into…</b> to combine them:</p>' +
      dupNames.map((k) => byName[k].map((c) => '<span class="chip" data-cid="' + esc(c.id) + '">' + esc(c.icon || '') + ' ' + esc(c.name) + ' · ' + esc(c.kind || 'expense') + '</span>').join(' ')).join('<br>') +
      '</div>';
  }
  html += '<div class="card"><h3>Categories</h3><p class="tiny" style="margin:0 0 4px">Tap a group or subcategory to expand · tap a category to edit</p>';
  const catTags = (cat) => {
    const k = cat.kind || 'expense';
    const kindTag = k === 'income' ? '<span class="tiny" style="color:var(--status-good)">income</span>'
      : k === 'invest' ? '<span class="tiny" style="color:var(--blue)">investment</span>'
      : k === 'transfer' ? '<span class="tiny" style="color:var(--dim)">transfer</span>' : '';
    const otTag = catExcludedFromEstimates(cat) ? '<span class="tiny" style="color:var(--faint)"> · one-time</span>' : '';
    return (kindTag || otTag) ? '<div class="t2">' + kindTag + otTag + '</div>' : '';
  };
  const catTreeRow = (cat, lvl) => '<div class="tree-row ' + lvl + '" data-cid="' + esc(cat.id) + '"><span class="ic">' + esc(cat.icon || '•') + '</span>' +
    '<div class="body"><div class="t1">' + esc(cat.name) + '</div>' + catTags(cat) + '</div><span class="chev">✎</span></div>';
  for (const g of GROUPS){
    const cats = liveCats().filter((cat) => cat.group === g.id);
    if (!cats.length && g.kind === 'system') continue;
    const gOpen = CATS_OPEN.has('g:' + g.id);
    html += '<div class="tree-row grp" data-gtog="' + g.id + '"><span class="ic">' + (g.icon || '📂') + '</span>' +
      '<div class="body"><div class="t1">' + esc(g.name) + '</div></div>' +
      (g.kind === 'system' ? '' : '<span class="tree-act" data-gadd="' + g.id + '">＋</span>') +
      '<span class="chev">' + (gOpen ? '▾' : '▸') + '</span></div>';
    if (!gOpen) continue;
    const bySub = {}, direct = [];
    for (const cat of cats){ if (cat.sub){ (bySub[cat.sub] = bySub[cat.sub] || []).push(cat); } else direct.push(cat); }
    for (const cat of direct) html += catTreeRow(cat, 'tree-l1');
    for (const s in bySub){
      const sOpen = CATS_OPEN.has('sub:' + g.id + '|' + s);
      html += '<div class="tree-row tree-l1" data-stog="' + esc(g.id + '|' + s) + '"><span class="ic">' + subIcon(g.id, s) + '</span>' +
        '<div class="body"><div class="t1">' + esc(s) + '</div><div class="t2">' + bySub[s].length + ' categor' + (bySub[s].length === 1 ? 'y' : 'ies') + '</div></div>' +
        '<span class="tree-act" data-sedit="' + esc(g.id + '|' + s) + '">✎</span>' +
        '<span class="tree-act" data-sadd="' + esc(g.id + '|' + s) + '">＋</span>' +
        '<span class="chev">' + (sOpen ? '▾' : '▸') + '</span></div>';
      if (sOpen) for (const cat of bySub[s]) html += catTreeRow(cat, 'tree-l2');
    }
  }
  html += '</div>';
  const rules = liveRules().sort((a, b) => (a.pattern < b.pattern ? -1 : 1));
  html += '<div class="card"><h3>Rules (' + rules.length + ')</h3>' +
    (rules.length ? '' : '<p class="muted" style="margin:0 0 8px">Rules auto-categorize imports: “merchant contains X → category”.</p>') +
    rules.map((r) => '<div class="list-item" style="cursor:default"><div class="body">' +
      '<span class="rule-pat">' + esc(r.pattern) + '</span> <span class="tiny">' + r.type + '</span>' +
      '<div class="t2">→ ' + esc(catLabel(r.cat).name) + '</div></div>' +
      '<button class="btn btn-sm" data-rdel="' + esc(r.id) + '">×</button></div>').join('') +
    '<button class="btn btn-sm btn-block" data-x="radd" style="margin-top:8px">＋ Add rule</button></div>';

  // Archived categories — hidden from pickers but restorable.
  const archived = Object.values(DATA.cats).filter((c2) => c2.deleted).sort((a, b) => ((a.name || '') < (b.name || '') ? -1 : 1));
  if (archived.length){
    html += '<div class="card"><h3>Archived (' + archived.length + ')</h3>' +
      '<p class="tiny" style="margin:0 0 6px">Hidden from pickers; past transactions keep them. Unarchive to bring one back.</p>' +
      archived.map((c2) => '<div class="list-item" style="cursor:default"><span class="ic">' + esc(c2.icon || '•') + '</span>' +
        '<div class="body"><div class="t1">' + esc(c2.name || c2.id) + '</div><div class="t2">' + esc(c2.kind || 'expense') + '</div></div>' +
        '<button class="btn btn-sm" data-unarch="' + esc(c2.id) + '">Unarchive</button></div>').join('') + '</div>';
  }

  c.innerHTML = html;

  const rerender = () => renderCatsScreen(c);
  c.querySelectorAll('[data-unarch]').forEach((b) => {
    b.onclick = () => { const cc = DATA.cats[b.dataset.unarch]; if (cc){ cc.deleted = false; put('cats', cc); } renderCatsScreen(c); toast('Category restored'); };
  });
  const toggle = (k) => { if (CATS_OPEN.has(k)) CATS_OPEN.delete(k); else CATS_OPEN.add(k); rerender(); };
  c.querySelectorAll('[data-gtog]').forEach((row) => {
    row.onclick = (e) => { if (e.target.closest('[data-gadd]')) return; toggle('g:' + row.dataset.gtog); };
  });
  c.querySelectorAll('[data-stog]').forEach((row) => {
    row.onclick = (e) => { if (e.target.closest('[data-sedit],[data-sadd]')) return; toggle('sub:' + row.dataset.stog); };
  });
  c.querySelectorAll('[data-gadd]').forEach((a2) => { a2.onclick = (e) => { e.stopPropagation(); openAddCatModal(a2.dataset.gadd, null, rerender); }; });
  c.querySelectorAll('[data-sadd]').forEach((a2) => { a2.onclick = (e) => { e.stopPropagation(); const b = a2.dataset.sadd.indexOf('|'); openAddCatModal(a2.dataset.sadd.slice(0, b), a2.dataset.sadd.slice(b + 1), rerender); }; });
  c.querySelectorAll('[data-sedit]').forEach((a2) => { a2.onclick = (e) => { e.stopPropagation(); openSubEditor(a2.dataset.sedit, rerender); }; });
  c.querySelectorAll('[data-cid]').forEach((n2) => { n2.onclick = () => openCatEditor(n2.dataset.cid, rerender); });
  c.querySelectorAll('[data-rdel]').forEach((b) => {
    b.onclick = () => { softDelete('rules', b.dataset.rdel); renderCatsScreen(c); toast('Rule removed'); };
  });
  c.querySelector('[data-x=radd]').onclick = () => {
    let ruleCat = null, ruleType = 'contains';
    const m = modal('New rule',
      '<label class="fld"><span>When merchant contains…</span><input type="text" data-x="pat" placeholder="COSTCO"></label>' +
      '<div class="seg" style="margin-bottom:10px"><button data-x="t1" class="on">Contains</button><button data-x="t2">Exact</button></div>' +
      '<button class="btn btn-block" data-x="pc" style="margin-bottom:10px">Category: tap to pick</button>' +
      '<button class="btn btn-primary btn-block" data-x="sv" disabled>Add rule</button>');
    const q2 = (s2) => m.node.querySelector(s2);
    const upd = () => { q2('[data-x=sv]').disabled = !(ruleCat && q2('[data-x=pat]').value.trim()); };
    q2('[data-x=pat]').oninput = upd;
    q2('[data-x=t1]').onclick = () => { ruleType = 'contains'; q2('[data-x=t1]').classList.add('on'); q2('[data-x=t2]').classList.remove('on'); };
    q2('[data-x=t2]').onclick = () => { ruleType = 'exact'; q2('[data-x=t2]').classList.add('on'); q2('[data-x=t1]').classList.remove('on'); };
    q2('[data-x=pc]').onclick = async () => {
      const cat = await openCatPicker({ showSystem: true });
      if (cat){ ruleCat = cat; q2('[data-x=pc]').textContent = 'Category: ' + catLabel(cat).name; upd(); }
    };
    q2('[data-x=sv]').onclick = () => {
      createRule(q2('[data-x=pat]').value, ruleCat, ruleType);
      const n3 = reapplyRules();
      m.close(); renderCatsScreen(c);
      toast('Rule added' + (n3 ? ' · ' + n3 + ' auto-sorted' : ''));
    };
  };
}

/* ---- Accounts screen ---- */
const acctIcon = (t) => t === 'credit' ? '💳' : t === 'btc' ? '₿' : t === 'investment' ? '📈' : t === 'savings' ? '🏦' : '🏦';
function renderAccountsScreen(c){
  const counts = {};
  for (const t of liveTxns()) counts[t.acct] = (counts[t.acct] || 0) + 1;
  const accts = Object.values(DATA.accounts).filter((a) => !a.deleted).sort((a, b) => (a.archived?1:0) - (b.archived?1:0));
  if (accts.some((a) => a.type === 'btc' && !a.archived)) refreshBtcPrice().then((r) => { if (r.changed) renderAccountsScreen(c); });
  // Balance to display: BTC accounts show current market value; others use the anchor+flows.
  const dispBal = (a) => a.type === 'btc' ? btcStats(a.id).value : accountBalance(a);
  // Household roll-up: cash (checking+savings) + investments − credit owed.
  let cash = 0, invest = 0, credit = 0, anyBal = false;
  for (const a of accts){
    if (a.archived) continue;
    const bal = dispBal(a);
    if (bal == null) continue;
    anyBal = true;
    if (a.type === 'credit') credit += bal; else if (a.type === 'investment' || a.type === 'btc') invest += bal; else cash += bal;
  }
  const netWorth = cash + invest + credit; // credit balance is negative when owed
  let html = '';
  if (anyBal){
    html += '<div class="stat" style="margin-bottom:12px"><div class="v">' + fmt$(netWorth) + '</div>' +
      '<div class="l">net across accounts</div>' +
      '<div class="tiny">' + fmt$(cash) + ' cash · ' + fmt$(invest) + ' invested' + (credit !== 0 ? ' · ' + fmt$(credit) + ' cards' : '') + '</div></div>';
  }
  html += '<div class="card"><h3>Accounts</h3>' +
    (accts.length ? accts.map((a) => {
      if (a.type === 'btc'){
        const b = btcStats(a.id);
        const gain = b.value != null ? b.value - b.invested : null;
        return '<div class="list-item" data-aid="' + esc(a.id) + '"><span class="ic">' + acctIcon(a.type) + '</span>' +
          '<div class="body"><div class="t1">' + esc(a.name) + (a.archived ? ' <span class="tiny">(archived)</span>' : '') + '</div>' +
          '<div class="t2">' + fmtBtc(b.sats) + ' · avg ' + (b.avgCost ? fmt$(b.avgCost) : '—') + (b.price ? ' · now ' + fmt$(b.price) : '') + '</div></div>' +
          '<span class="amt" style="text-align:right">' + (b.value != null ? fmt$(b.value) : '—') +
          (gain != null ? '<div class="tiny" style="color:' + (gain >= 0 ? 'var(--status-good)' : 'var(--status-crit)') + '">' + fmt$(gain, { signed: true }) + '</div>' : '') + '</span></div>';
      }
      const bal = dispBal(a);
      return '<div class="list-item" data-aid="' + esc(a.id) + '"><span class="ic">' + acctIcon(a.type) + '</span>' +
      '<div class="body"><div class="t1">' + esc(a.name) + (a.archived ? ' <span class="tiny">(archived)</span>' : '') + '</div>' +
      '<div class="t2">' + esc(acctTypeLabel(a.type)) + ' · ' + (counts[a.id] || 0) + ' transactions</div></div>' +
      (bal == null ? '<span class="tiny" style="color:var(--faint)">set balance ›</span>'
                   : '<span class="amt"' + (bal < 0 ? ' style="color:var(--status-crit)"' : '') + '>' + fmt$(bal) + '</span>') +
      '</div>';
    }).join('')
      : '<p class="muted" style="margin:0">Accounts are created during import — or add one below.</p>') +
    '<p class="tiny" style="margin:8px 0 0">Tap an account to set its balance. Nest shows the current balance = what you enter + every transaction since that date.</p></div>' +
    '<div class="card"><h3>Add account</h3><div class="row">' +
    '<input type="text" data-x="nm" placeholder="e.g. Chase Sapphire" class="grow">' +
    '<select data-x="ty" style="max-width:140px">' + ACCT_TYPES.map(([v, l]) => '<option value="' + v + '">' + l + '</option>').join('') + '</select>' +
    '<button class="btn btn-sm" data-x="add">Add</button></div></div>';
  c.innerHTML = html;
  c.querySelector('[data-x=add]').onclick = () => {
    const name = c.querySelector('[data-x=nm]').value.trim();
    if (!name) return;
    put('accounts', { id: uid(), name, type: c.querySelector('[data-x=ty]').value });
    renderAccountsScreen(c); toast('Account added');
  };
  c.querySelectorAll('[data-aid]').forEach((n2) => {
    n2.onclick = () => openAccountEditor(n2.dataset.aid, () => renderAccountsScreen(c));
  });
}
// Standalone account editor (name / type / balance anchor) — callable from the

    '<div class="row"><button class="btn grow" data-x="sv">Save</button>' +
    '<button class="btn btn-danger grow" data-x="ar">' + (a.archived ? 'Unarchive' : 'Archive') + '</button></div>');
  m.node.querySelector('[data-x=sv]').onclick = () => {
    const name = m.node.querySelector('[data-x=nm]').value.trim();
    if (!name) return;
    a.name = name; a.type = m.node.querySelector('[data-x=ty]').value;
    const bv = m.node.querySelector('[data-x=bal]').value.trim();
    if (bv === '') { delete a.anchorBal; delete a.anchorDate; }
    else { a.anchorBal = parseAmountCents(bv); a.anchorDate = m.node.querySelector('[data-x=bd]').value || (currentYM() + '-01'); }
    put('accounts', a); m.close(); if (after) after(); renderCurrent();
  };
  m.node.querySelector('[data-x=ar]').onclick = () => {
    a.archived = !a.archived; put('accounts', a); m.close(); if (after) after(); renderCurrent();
  };
}

/* ---- Data health screen (statement-coverage audit) ---- */
function renderHealthScreen(c){
  const txns = liveTxns();
  if (!txns.length){ c.innerHTML = '<div class="empty">Nothing imported yet.</div>'; return; }
  const accts = Object.values(DATA.accounts).filter((a) => !a.deleted);
  const rv = reviewTxns().length;
  let html = '<p class="muted" style="margin:0 0 10px">Every account, every month between its first and last transaction. ' +
    '<b>A month with zero transactions almost always means a missing statement</b> — gaps silently skew averages, the baseline and the yearly forecast.</p>' +
    (rv ? '<p class="tiny" style="margin:0 0 10px">Also: ' + rv + ' transactions still in review — unsorted money sits out of all totals until sorted.</p>' : '');

  // Money-in filed under spending categories: each one REDUCES that month's
  // spend by its full amount — the #1 cause of impossible negative months.
  const agg = buildMonthAgg();
  const negMonths = Object.keys(agg).filter((ym) => agg[ym].spendTotal < 0).sort();
  const susp = txns.filter((t) => {
    if (t.status === 'excluded' || t.amt < 10000) return false; // inflows >= $100 only
    return effParts(t).some((p) => p.cat && p.cat !== '__uncat' && catKind(p.cat) === 'expense' && p.amt > 0);
  }).sort((a, b) => b.amt - a.amt);
  if (negMonths.length || susp.length){
    html += '<div class="card" style="border-color:var(--status-crit)"><h3>⚠️ Math-breaking anomalies</h3>' +
      (negMonths.length ? '<p style="margin:0 0 8px">' + negMonths.map(fmtMonth).join(', ') +
        (negMonths.length > 1 ? ' have' : ' has') + ' <b>negative total spending</b>.</p>' : '') +
      (susp.length ? '<p class="muted" style="margin:0 0 8px">These show as <b>money IN</b> but sit in an <b>Expense-type</b> category, so each subtracts from that month. Fixes: ' +
        '(1) if the whole category is really income — e.g. Seed Money — change its <b>Type</b> to Income in Categories &amp; Rules (fixes all at once); ' +
        '(2) if just this item is an inflow, recategorize it; ' +
        '(3) if it was an expense imported backwards, open it and tap <b>⇄ Flip</b>. Small refunds are fine. Tap any to fix:</p>' +
        susp.slice(0, 12).map((t) => txnRowHTML(t)).join('') : '') +
      '</div>';
  }
  for (const a of accts){
    const mine = txns.filter((t) => t.acct === a.id);
    if (!mine.length) continue;
    const byYM = {};
    let minD = null, maxD = null;
    for (const t of mine){
      const ym = ymOf(t.date);
      (byYM[ym] = byYM[ym] || { n: 0, out: 0, inn: 0 }).n++;
      if (t.amt < 0) byYM[ym].out += -t.amt; else byYM[ym].inn += t.amt;
      if (!minD || t.date < minD) minD = t.date;
      if (!maxD || t.date > maxD) maxD = t.date;
    }
    const span = ymRange(ymOf(minD), ymOf(maxD));
    const gaps = span.filter((ym) => !byYM[ym]);
    html += '<div class="card"><h3>' + esc(a.name) + '</h3>' +
      '<p class="tiny" style="margin:0 0 8px">' + minD + ' → ' + maxD + ' · ' + mine.length + ' transactions · ' +
      (gaps.length ? '<b style="color:var(--status-crit)">' + gaps.length + ' gap month' + (gaps.length > 1 ? 's' : '') + ' ⚠️</b>' : 'no gaps ✓') + '</p>' +
      '<div class="tbl-wrap"><table class="map-tbl"><tr><th>Month</th><th style="text-align:right">Txns</th><th style="text-align:right">Out</th><th style="text-align:right">In</th></tr>' +
      span.map((ym) => {
        const b = byYM[ym];
        return b
          ? '<tr><td>' + fmtMonth(ym) + '</td><td style="text-align:right">' + b.n + '</td><td style="text-align:right">' + fmt$(b.out) + '</td><td style="text-align:right">' + fmt$(b.inn) + '</td></tr>'
          : '<tr><td style="color:var(--status-crit)">' + fmtMonth(ym) + '</td><td colspan="3" style="color:var(--status-crit)">⚠️ nothing — missing statement?</td></tr>';
      }).join('') + '</table></div></div>';
  }
  html += '<p class="tiny">Fix a gap by downloading that date range from the bank and importing it — overlapping rows are deduped automatically, so grabbing extra is always safe.</p>';
  c.innerHTML = html;
  c.querySelectorAll('[data-txn]').forEach((n2) => { n2.onclick = () => openTxnEditor(n2.dataset.txn); });
}

/* ---- Claude triage screen ---- */
function renderClaudeScreen(c){
  const merchants = new Set(reviewTxns().map((t) => t.m)).size;
  c.innerHTML =
    '<div class="card"><h3>1 · Copy a digest</h3>' +
    '<p class="muted" style="margin:0 0 10px">' + (merchants ? '<b style="color:var(--text)">' + merchants + '</b> merchants are waiting in review.' : 'Review queue is empty.') +
    ' Paste a digest into any Claude chat; the <b>audit</b> digest includes everything already categorized so mistakes can be caught too.</p>' +
    '<button class="btn btn-primary btn-block" data-x="copy"' + (merchants ? '' : ' disabled') + ' style="margin-bottom:8px">📋 Copy review digest</button>' +
    '<button class="btn btn-block" data-x="copyall">🔍 Copy full audit digest (everything)</button></div>' +
    '<div class="card"><h3>2 · Paste Claude’s rules back</h3>' +
    '<textarea data-x="paste" rows="5" placeholder=\'[{"pattern":"HOME DEPOT","cat":"hou-maint"}]\'></textarea>' +
    '<label class="row" style="margin-top:10px"><input type="checkbox" data-x="retro" style="width:auto"> ' +
    '<span class="muted">Audit mode — also re-sort transactions that were already categorized (splits are never touched)</span></label>' +
    '<button class="btn btn-primary btn-block" data-x="apply" style="margin-top:10px">Apply rules</button></div>';
  c.querySelector('[data-x=copy]').onclick = async () => {
    const ok = await copyText(exportReviewDigest(false));
    toast(ok ? 'Review digest copied — paste it to Claude' : 'Copy failed — try again');
  };
  c.querySelector('[data-x=copyall]').onclick = async () => {
    const ok = await copyText(exportReviewDigest(true));
    toast(ok ? 'Audit digest copied — paste it to Claude' : 'Copy failed — try again');
  };
  c.querySelector('[data-x=apply]').onclick = () => {
    const retro = c.querySelector('[data-x=retro]').checked;
    const r = importRulesJSON(c.querySelector('[data-x=paste]').value, retro);
    if (r.error){ toast(r.error); return; }
    toast(r.created + ' rules · ' + r.resolved + ' review sorted' + (r.changed ? ' · ' + r.changed + ' re-sorted' : ''));
    renderClaudeScreen(c); updateReviewBadge();
  };
}

/* ---- Sync screen ---- */
function renderSyncScreen(c){
  let html = '<div class="card"><h3>Status</h3><p style="margin:0">' +
    (CRYPTO ? '🔒 Sync is ON — room <span class="rule-pat">' + CRYPTO.roomId.slice(0, 8) + '…</span> · ' + esc(SYNC.status)
            : 'Sync is off — data lives only on this device.') + '</p>' +
    '<p class="muted" style="margin:8px 0 0">End-to-end encrypted: the passphrase never leaves your devices — the server stores only ciphertext. ' +
    'Use the <b>same passphrase on both phones</b> to share one ledger.</p></div>';
  if (!CRYPTO){
    html += '<div class="card"><h3>Enable sync</h3>' +
      '<label class="fld"><span>Shared passphrase — min 8 chars, try 4 random words</span><input type="password" data-x="p1" autocomplete="off"></label>' +
      '<label class="fld"><span>Repeat it</span><input type="password" data-x="p2" autocomplete="off"></label>' +
      '<button class="btn btn-primary btn-block" data-x="en">Enable sync</button>' +
      '<p class="tiny" style="margin:8px 0 0">Write it down — there is no reset. A lost passphrase = a new empty sync room.</p></div>';
  } else {
    html += '<div class="row" style="margin-bottom:10px"><button class="btn grow" data-x="now">Sync now</button>' +
      '<button class="btn btn-danger grow" data-x="off">Disconnect</button></div>' +
      '<p class="tiny">Disconnecting keeps everything on this device; it just stops syncing.</p>';
  }
  c.innerHTML = html;
  const q = (s2) => c.querySelector(s2);
  if (!CRYPTO){
    q('[data-x=en]').onclick = async () => {
      const p1 = q('[data-x=p1]').value, p2 = q('[data-x=p2]').value;
      if (p1.length < 8){ toast('Passphrase must be at least 8 characters'); return; }
      if (p1 !== p2){ toast('Passphrases don’t match'); return; }
      const btn = q('[data-x=en]');
      btn.disabled = true; btn.textContent = 'Setting up…';
      try {
        await enableSync(p1);
        toast('Sync enabled 🔒');
      } catch (e) { toast('Could not reach sync server — will retry automatically'); }
      renderMore();
    };
  } else {
    q('[data-x=now]').onclick = async () => {
      const btn = q('[data-x=now]');
      btn.disabled = true; btn.textContent = 'Syncing…';
      await syncPush();
      renderMore();
      toast(SYNC.status === 'synced' ? 'Synced ✓' : 'Sync ' + SYNC.status);
    };
    q('[data-x=off]').onclick = async () => {
      if (!(await confirmDlg('Turn off sync on this device? Local data stays.', 'Disconnect'))) return;
      disableSync(); renderMore(); toast('Sync off');
    };
  }
}

/* ---- Backup screen ---- */
function renderBackupScreen(c){
  c.innerHTML =
    '<div class="card"><h3>Export</h3><p class="muted" style="margin:0 0 10px">Plain-JSON snapshot of everything — keep it somewhere private.</p>' +
    '<button class="btn btn-primary btn-block" data-x="ex">⬇️ Export backup file</button></div>' +
    '<div class="card"><h3>Import</h3><p class="muted" style="margin:0 0 10px">Merge combines with what’s here (newest edit wins). Replace wipes this device first.</p>' +
    '<div class="row"><button class="btn grow" data-x="im">Import & merge</button>' +
    '<button class="btn btn-danger grow" data-x="ir">Replace…</button></div></div>';
  const fi = document.createElement('input');
  fi.type = 'file'; fi.accept = '.json,application/json'; fi.style.display = 'none';
  c.appendChild(fi);
  let mode = 'merge';
  const pick = (m2) => { mode = m2; fi.value = ''; fi.click(); };
  c.querySelector('[data-x=ex]').onclick = () => exportBackup();
  c.querySelector('[data-x=im]').onclick = () => pick('merge');
  c.querySelector('[data-x=ir]').onclick = async () => {
    if (await confirmDlg('Replace ALL data on this device with the backup file?', 'Replace')) pick('replace');
  };
  fi.onchange = async () => {
    const f = fi.files && fi.files[0];
    if (!f) return;
    const r = importBackup(await f.text(), mode);
    if (r.error){ toast(r.error); return; }
    toast('Backup ' + (mode === 'replace' ? 'restored' : 'merged') + ' — ' + r.entities + ' entities');
    renderCurrent();
  };
}

if ('serviceWorker' in navigator){
  // Auto-refresh once when a new app version takes over, so shipped updates
  // actually land on installed PWAs without a manual force-close.
  const hadController = !!navigator.serviceWorker.controller;
  let refreshed = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!hadController || refreshed) return;
    refreshed = true;
    saveNow();
    window.location.reload();
  });
  window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(() => {}); });
  // Resident PWAs never re-navigate on foreground; check for a new sw.js there too.
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) navigator.serviceWorker.getRegistration().then((r) => { if (r) r.update(); });
  });
}
{
  const pass = localStorage.getItem('nest.pass');
  if (pass) deriveKeys(pass).then((k) => {
    CRYPTO = k;
    syncPull().then(() => { if (SYNC.dirty) syncPush(); }).catch(() => {});
  });
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden){ saveNow(); }
  else if (CRYPTO){ SYNC.dirty ? syncPush() : syncPull().catch(() => {}); }
});
window.addEventListener('beforeunload', saveNow);
