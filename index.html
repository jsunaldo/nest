        '<select data-x="ntype" style="max-width:140px">' + ACCT_TYPES.map(([v, l]) => '<option value="' + v + '">' + l + '</option>').join('') + '</select>' +
        '<button class="btn btn-sm" data-x="nadd">Add</button></div></div>' +
        '<div style="margin-bottom:10px"><span class="chip' + (customOpen ? '' : ' on') + '" data-x="preset">' +
        (a.preset ? esc(a.preset.label) + ' · tap to adjust' : 'Custom mapping') + '</span></div>';
      if (customOpen){
        html += '<div class="card" style="background:var(--card2)">' +
          '<div class="row" style="margin-bottom:8px">' +
          '<label class="fld grow"><span>Date column</span>' + colSelect('cdate', mapping.dateIdx) + '</label>' +
          '<label class="fld grow"><span>Description</span>' + colSelect('cdesc', mapping.descIdx) + '</label></div>' +
          '<div class="seg" style="margin-bottom:8px">' +
          '<button data-x="m1" class="' + (mode === 'single' ? 'on' : '') + '">One amount column</button>' +
          '<button data-x="m2" class="' + (mode === 'dc' ? 'on' : '') + '">Debit + credit</button></div>' +
          (mode === 'single'
            ? '<label class="fld"><span>Amount column</span>' + colSelect('camt', mapping.amountIdx) + '</label>'
            : '<div class="row"><label class="fld grow"><span>Debit (money out)</span>' + colSelect('cdeb', mapping.debitIdx) + '</label>' +
              '<label class="fld grow"><span>Credit (money in)</span>' + colSelect('ccre', mapping.creditIdx) + '</label></div>') +
          '</div>';
      }
      const prevRows = res.parsed.slice(0, 5).map((p) =>
        '<tr><td>' + p.date + '</td><td>' + esc(p.desc) + '</td><td style="text-align:right">' + fmt$(p.amt) + '</td></tr>').join('');
      html += '<div class="tbl-wrap"><table class="map-tbl"><tr><th>Date</th><th>Description</th><th style="text-align:right">Amount</th></tr>' +
        (prevRows || '<tr><td colspan="3" class="muted">Nothing parseable with this mapping</td></tr>') + '</table></div>' +
        '<div class="muted" style="margin:8px 0">' + res.parsed.length + ' rows · ' + out + ' money out · ' + inn + ' money in' +
        (res.skipped ? ' · ' + res.skipped + ' unparseable skipped' : '') + '</div>' +
        '<label class="row" style="margin-bottom:10px"><input type="checkbox" data-x="flip" style="width:auto"' +
        (mapping.flip ? ' checked' : '') + '> <span class="muted">Flip signs (purchases are showing as money in)</span></label>' +
        '<button class="btn btn-primary btn-block" data-x="go"' + ((acctId && res.parsed.length) ? '' : ' disabled') + '>Import ' +
        res.parsed.length + ' transactions</button>';
      body.innerHTML = html;
      bind(res);
    }
    function bind(res){
      const q = (s) => body.querySelector(s);
      q('[data-x=acct]').onchange = (e) => {
        if (e.target.value === '__new') q('[data-x=newacct]').style.display = 'block';
        else { acctId = e.target.value || null; draw(); }
      };
      if (q('[data-x=nadd]')) q('[data-x=nadd]').onclick = () => {
        const name = q('[data-x=nname]').value.trim();
        if (!name) return;
        const acc = put('accounts', { id: uid(), name, type: q('[data-x=ntype]').value });
        acctId = acc.id; draw();
      };
      q('[data-x=preset]').onclick = () => { customOpen = !customOpen; draw(); };
      q('[data-x=flip]').onchange = (e) => { mapping.flip = e.target.checked; draw(); };
      const colBind = (x, key) => { const n2 = q('[data-x=' + x + ']'); if (n2) n2.onchange = (e) => { mapping[key] = +e.target.value; draw(); }; };
      colBind('cdate', 'dateIdx'); colBind('cdesc', 'descIdx'); colBind('camt', 'amountIdx');
      colBind('cdeb', 'debitIdx'); colBind('ccre', 'creditIdx');
      const seg = (x, fn) => { const n2 = q('[data-x=' + x + ']'); if (n2) n2.onclick = fn; };
      seg('m1', () => { mode = 'single'; mapping.debitIdx = null; mapping.creditIdx = null; if (mapping.amountIdx == null) mapping.amountIdx = -1; draw(); });
      seg('m2', () => { mode = 'dc'; mapping.amountIdx = null; if (mapping.debitIdx == null) mapping.debitIdx = -1; if (mapping.creditIdx == null) mapping.creditIdx = -1; draw(); });
      q('[data-x=go]').onclick = () => {
        const r = importParsed(acctId, res.parsed, a.filename);
        const prefs = importPrefs(); prefs.sigs[sigKey] = acctId; put('kv', prefs);
        LAST_IMPORT_ACCT = acctId;
        body.innerHTML = '<div class="card" style="background:var(--card2)"><h3>Imported</h3>' +
          '<p style="margin:0 0 6px">Added <b>' + r.added + '</b> · skipped <b>' + r.dupes + '</b> duplicate' + (r.dupes === 1 ? '' : 's') + '</p>' +
          (r.from ? '<p class="muted" style="margin:0 0 6px">' + fmtDate(r.from) + ' → ' + fmtDate(r.to) + '</p>' : '') +
          '<p style="margin:0">' + (r.review ? '<b>' + r.review + '</b> need review' : 'Everything auto-categorized 🎉') + '</p></div>' +
          '<div class="row">' + (r.review ? '<button class="btn grow" data-x="rev">Review now</button>' : '') +
          '<button class="btn btn-primary grow" data-x="done">Done</button></div>';
        const rv = body.querySelector('[data-x=rev]');
        if (rv) rv.onclick = () => { m.close(); showTab('review'); };
        body.querySelector('[data-x=done]').onclick = () => m.close();
      };
    }
    draw();
  });
}

const BREAKDOWN_OPEN = new Set(); // collapsible breakdown tree: '<pfx>:g:<gid>' and '<pfx>:sub:<gid>|<sub>'
// Collapsible category-breakdown tree (Group ▸ direct categories + Subcategories ▸
// their categories, then Invested). Each group/subcategory row rolls up a subtotal
// and toggles (data-btog); each category leaf carries data-cat for tap-through.
function groupedCatHTML(spendMap, incomeMap, investMap, opts){
  opts = opts || {}; const pfx = opts.pfx || 'b';
  const grpRow = (icon, name, amtStr, color, tog, open) =>
    '<div class="tree-row grp" data-btog="' + esc(tog) + '" style="cursor:pointer"><span class="ic">' + icon + '</span>' +
    '<div class="body"><div class="t1">' + esc(name) + '</div></div><span class="amt" style="color:' + color + '">' + amtStr + '</span>' +
    '<span class="chev">' + (open ? '▾' : '▸') + '</span></div>';
  const subRow = (gid, s, amtStr, open) =>
    '<div class="tree-row tree-l1" data-btog="' + esc(pfx + ':sub:' + gid + '|' + s) + '" style="cursor:pointer"><span class="ic">' + subIcon(gid, s) + '</span>' +
    '<div class="body"><div class="t1">' + esc(s) + '</div></div><span class="amt">' + amtStr + '</span>' +
    '<span class="chev">' + (open ? '▾' : '▸') + '</span></div>';
  const catLeaf = (cid, amtStr, color, lvl) => { const cl = catLabel(cid); return '<div class="tree-row ' + lvl + '" data-cat="' + esc(cid) + '"><span class="ic">' + cl.icon + '</span><div class="body"><div class="t1">' + esc(cl.name) + '</div></div><span class="amt" style="color:' + color + '"><span class="chev"></span>' + amtStr + '</span></div>'; };
  let html = '';
  for (const g of GROUPS){
    if (g.kind === 'system') continue;
    const income = g.kind === 'income';
    const src = income ? (incomeMap || {}) : spendMap;
    const sign = income ? '+' : '−', gcolor = income ? 'var(--status-good)' : 'var(--dim)', lcolor = income ? 'var(--status-good)' : 'var(--text)';
    const cats = Object.keys(src).filter((c) => src[c] > 0 && DATA.cats[c] && DATA.cats[c].group === g.id);
    if (!cats.length) continue;
    const gTotal = cats.reduce((s, c) => s + src[c], 0);
    const gkey = pfx + ':g:' + g.id, gOpen = BREAKDOWN_OPEN.has(gkey);
    html += grpRow(g.icon || '📂', g.name, sign + fmt$(gTotal), gcolor, gkey, gOpen);
    if (!gOpen) continue;
    const bySub = {}, direct = [];
    for (const c of cats){ const s = DATA.cats[c].sub; if (s){ (bySub[s] = bySub[s] || []).push(c); } else direct.push(c); }
    const items = direct.map((c) => ({ type: 'cat', cid: c, amt: src[c] }))
      .concat(Object.keys(bySub).map((s) => ({ type: 'sub', s, cats: bySub[s], amt: bySub[s].reduce((x, c) => x + src[c], 0) })))
      .sort((a, b) => b.amt - a.amt);
    for (const it of items){
      if (it.type === 'cat') html += catLeaf(it.cid, sign + fmt$(it.amt), lcolor, 'tree-l1');
      else {
        const sOpen = BREAKDOWN_OPEN.has(pfx + ':sub:' + g.id + '|' + it.s);
        html += subRow(g.id, it.s, sign + fmt$(it.amt), sOpen);
        if (sOpen) for (const c of it.cats.slice().sort((a, b) => src[b] - src[a])) html += catLeaf(c, sign + fmt$(src[c]), lcolor, 'tree-l2');
      }
    }
  }
  if (spendMap.__uncat > 0) html += catLeaf('__uncat', '−' + fmt$(spendMap.__uncat), 'var(--status-warn)', 'grp');
  const inv = Object.keys(investMap || {}).filter((c) => investMap[c] !== 0).sort((a, b) => Math.abs(investMap[b]) - Math.abs(investMap[a]));
  if (inv.length){
    const t = inv.reduce((s, c) => s + investMap[c], 0);
    const gkey = pfx + ':g:invest', gOpen = BREAKDOWN_OPEN.has(gkey);
    html += grpRow('📈', 'Invested', fmt$(t), 'var(--blue)', gkey, gOpen);
    if (gOpen) for (const c of inv) html += catLeaf(c, fmt$(investMap[c]), 'var(--blue)', 'tree-l1');
  }
  return html;
}

/* ---- §Home (yearly overview — the financial-advisor view) ---- */
function renderHome(){
  const c = $('#view-home');
  const all = liveTxns();
  if (!all.length){
    c.innerHTML =
      '<div class="card"><h3>Welcome to Nest 🪺</h3>' +
      '<p style="margin:0 0 8px">Every dollar you two spend — one place, both phones.</p>' +
      '<p class="muted" style="margin:0 0 4px">1. Import bank / card CSV statements below</p>' +
      '<p class="muted" style="margin:0 0 4px">2. Sort the few it can’t auto-categorize (Review tab)</p>' +
      '<p class="muted" style="margin:0">3. Set your baseline in More → Budgets, turn on Sync to share</p></div>' +
      '<button class="btn btn-primary btn-block" data-x="import">📥 Import statements</button>';
    c.querySelector('[data-x=import]').onclick = () => openScreen('Import', renderImportScreen);
    return;
  }
  const agg = buildMonthAgg();
  // Year lens: 'all' (Overall) is the default; arrows/dropdown step through it + each year.
  // Options are the GLOBAL year set so the shared lens is always valid across views.
  const years = dataYearList();
  const yearSeq = ['all'].concat(years);
  if (YEAR_LENS !== 'all' && !years.includes(YEAR_LENS)) YEAR_LENS = 'all';
  const yi = yearSeq.indexOf(YEAR_LENS);
  const st = yearStats(agg, YEAR_LENS);
  const baseline = baselineByCat(agg);
  const rq = reviewTxns();
  const rqOut = rq.reduce((s, t) => s + (t.amt < 0 ? -t.amt : 0), 0);
  const rqIn = rq.reduce((s, t) => s + (t.amt > 0 ? t.amt : 0), 0);

  let html = '<div class="month-nav"><button data-x="prev"' + (yi <= 0 ? ' disabled' : '') + '>‹</button>' +
    '<select data-x="ysel" class="ynav-sel">' + yearSeq.map((y) => '<option value="' + y + '"' + (y === YEAR_LENS ? ' selected' : '') + '>' + esc(yearLabel(y)) + '</option>').join('') + '</select>' +
    '<button data-x="next"' + (yi >= yearSeq.length - 1 ? ' disabled' : '') + '>›</button></div>';

  // Account balances — each account listed with its current balance (or a prompt
  // to set one). Header shows the net across everything.
  {
    const accts = liveAccounts();
    if (accts.length){
      if (accts.some((a) => a.type === 'btc')) refreshBtcPrice().then((r) => { if (r.changed && CURRENT_TAB === "home") renderHome(); });
      const dispBal = (a) => a.type === 'btc' ? btcStats(a.id).value : accountBalance(a);
      let net = 0, anyBal = false;
      for (const a of accts){ const b = dispBal(a); if (b != null){ net += b; anyBal = true; } }
      html += '<div class="card"><div class="row" style="margin-bottom:8px"><span style="font-size:15px" class="grow"><b>Accounts</b>' +
        (anyBal ? ' — <b>' + fmt$(net) + '</b> net' : '') + '</span>' +
        '<a data-x="bal" style="cursor:pointer;font-size:13px">manage ›</a></div>' +
        accts.map((a) => {
          const bal = dispBal(a);
          const sub = a.type === 'btc' ? fmtBtc(btcStats(a.id).sats) : esc(acctTypeLabel(a.type));
          return '<div class="list-item" data-aidhome="' + esc(a.id) + '"><span class="ic">' + acctIcon(a.type) + '</span>' +
            '<div class="body"><div class="t1">' + esc(a.name) + '</div><div class="t2">' + sub + '</div></div>' +
            (bal == null ? '<span class="tiny" style="color:var(--accent)">' + (a.type === 'btc' ? 'add BTC ›' : 'set balance ›') + '</span>'
                         : '<span class="amt"' + (bal < 0 ? ' style="color:var(--status-crit)"' : '') + '>' + fmt$(bal) + '</span>') + '</div>';
        }).join('') +
        (!anyBal ? '<p class="tiny" style="margin:8px 0 0">Tap an account to enter its current balance — Nest keeps it updated from your transactions.</p>' : '') +
        '</div>';
    }
  }

  // Balance over time — net worth across ALL accounts (the overall picture).
  {
    const bser = combinedBalanceSeries(YEAR_LENS), bpts = bser.pts;
    const bchart = balanceChartHTML(bpts);
    if (bchart){
      // Tiles + trend from the KNOWN points only (a partial year has null gaps).
      const known = bpts.map((p, i) => ({ i, v: p.bal })).filter((o) => o.v != null);
      const vals = known.map((o) => o.v), nn = known.length;
      const mx = known.reduce((s2, o) => s2 + o.i, 0) / nn, my = vals.reduce((x, y) => x + y, 0) / nn;
      let num = 0, den = 0;
      for (const o of known){ num += (o.i - mx) * (o.v - my); den += (o.i - mx) * (o.i - mx); }
      const perMo = den ? Math.round(num / den) : 0;
      const startBal = vals[0], curBal = vals[nn - 1], delta = curBal - startBal;
      html += '<div class="card"><h3>' + (bser.anchored ? 'Balance over time' : 'Net flow over time') + '</h3>' +
        (bser.anchored ? '<div class="bl-row" style="margin-bottom:10px">' +
          '<div class="bl-tile"><div class="bl-v">' + fmt$(startBal) + '</div><div class="bl-l">Start</div></div>' +
          '<div class="bl-tile"><div class="bl-v"' + (curBal < 0 ? ' style="color:var(--status-crit)"' : '') + '>' + fmt$(curBal) + '</div><div class="bl-l">Now</div></div>' +
          '<div class="bl-tile"><div class="bl-v" style="color:' + (delta >= 0 ? 'var(--status-good)' : 'var(--status-crit)') + '">' + fmt$(delta, { signed: true }) + '</div><div class="bl-l">Change</div></div></div>' : '') +
        bchart +
        '<div class="legend"><span><i style="background:var(--viz-2)"></i>' + (bser.anchored ? 'Net worth (all accounts)' : 'Cumulative flow') + '</span><span><i style="background:var(--accent)"></i>Trend</span></div>' +
        '<div class="chart-caption" style="min-height:0"><span style="color:var(--faint)">Trending ' + (perMo >= 0 ? '▲' : '▼') + ' ' + fmt$(Math.abs(perMo)) + '/mo' +
        (bser.anchored ? '' : ' · set account balances for real dollar amounts') + '</span></div></div>';
    }
  }

  // Bottom Line lens: overall / recurring / one-off — same tracking read on a
  // narrowed slice of the money.
  const incRecur = st.incomeRecur, incOne = st.income - st.incomeRecur;
  const spRecur = st.spend - st.spendOneTimeAgg, spOne = st.spendOneTimeAgg;
  const lens = HOME_BL === 'recurring'
      ? { inc: incRecur, sp: spRecur, label: 'recurring' }
    : HOME_BL === 'oneoff'
      ? { inc: incOne, sp: spOne, label: 'one-off' }
    : { inc: st.income, sp: st.spend, label: 'overall' };
  const lNet = lens.inc - lens.sp;
  const lRate = lens.inc > 0 ? Math.round(100 * lNet / lens.inc) : null;
  const proj = HOME_BL === 'recurring' ? st.projRecur : HOME_BL === 'oneoff' ? null : st.proj;
  html += '<div class="card"><h3>The bottom line</h3>' +
    '<div class="seg" style="margin-bottom:12px">' +
    '<button data-bl="overall" class="' + (HOME_BL === 'overall' ? 'on' : '') + '">Overall</button>' +
    '<button data-bl="recurring" class="' + (HOME_BL === 'recurring' ? 'on' : '') + '">Recurring</button>' +
    '<button data-bl="oneoff" class="' + (HOME_BL === 'oneoff' ? 'on' : '') + '">One-off</button></div>' +
    // Three scannable tiles: In / Out / Net.
    '<div class="bl-row">' +
      '<div class="bl-tile"><div class="bl-v amt-pos">' + fmt$(lens.inc) + '</div><div class="bl-l">In so far</div></div>' +
      '<div class="bl-tile"><div class="bl-v">' + fmt$(lens.sp) + '</div><div class="bl-l">Out so far</div></div>' +
      '<div class="bl-tile"><div class="bl-v" style="color:' + (lNet >= 0 ? 'var(--status-good)' : 'var(--status-crit)') + '">' + fmt$(lNet, { signed: true }) + '</div>' +
        '<div class="bl-l">Net' + (lRate !== null && lNet >= 0 ? ' · saving ' + lRate + '%' : '') + '</div></div>' +
    '</div>' +
    // Projection strip (overall/recurring only).
    (proj
      ? '<div class="bl-proj ' + (proj.net >= 0 ? 'good' : 'bad') + '">' +
        '<div class="grow"><div class="tiny" style="text-transform:uppercase;letter-spacing:.5px">Projected end of ' + esc(YEAR_LENS) + '</div>' +
        '<b style="font-size:19px;color:' + (proj.net >= 0 ? 'var(--status-good)' : 'var(--status-crit)') + '">' + fmt$(proj.net, { signed: true }) + '</b> ' +
        '<span class="tiny">' + (proj.net >= 0 ? '▲ on track to come out ahead' : '▼ on pace to go under') + '</span></div>' +
        '<div class="tiny" style="text-align:right;white-space:nowrap">' + fmt$(proj.rateIncome) + '/mo in<br>' + fmt$(proj.rateSpend) + '/mo out</div></div>'
      : HOME_BL === 'oneoff'
      ? '<p class="tiny" style="margin:0">One-time money only — seed transfers, gifts, wedding &amp; house costs. It doesn’t repeat, so there’s no forward pace; this is the net of the year’s big irregular events.</p>'
      : '') +
    (() => {
      const negs = st.months.filter((ym) => agg[ym] && agg[ym].spendTotal < 0);
      return negs.length
        ? '<p style="margin:8px 0 0;color:var(--status-crit)" class="tiny">⚠️ ' + negs.map(fmtMonth).join(', ') +
          ' show <b>negative spending</b> — money-in in a spend category. More → Data health.</p>'
        : '';
    })() +
    (HOME_BL === 'overall' && st.invest > 0 ? '<p class="muted tiny" style="margin:8px 0 0">📈 Plus ' + fmt$(st.invest) + ' invested — separate from spending.</p>' : '') +
    '</div>';

  if (rq.length){
    html += '<div class="card banner-review" data-x="rev"><div class="row"><span style="font-size:20px">🧾</span>' +
      '<div class="grow"><b>' + rq.length + '</b> transaction' + (rq.length > 1 ? 's' : '') + ' need review' +
      '<div class="tiny">' + fmt$(rqOut) + ' out · ' + fmt$(rqIn) + ' in — unsorted money sits OUT of every number above until you sort it</div></div><span class="menu-chev">›</span></div></div>';
  }

  if (st.months.length){
    // Default the highlighted month to the latest one WITH data (a partial year now
    // spans Jan–Dec, so the last slot can be an empty future/pre-history month).
    const withData = st.months.filter((ym) => agg[ym]);
    let chartSel = TRENDS_SEL.month;
    if (!chartSel || !st.months.includes(chartSel)) chartSel = (withData[withData.length - 1] || st.months[st.months.length - 1]);
    TRENDS_SEL.month = chartSel;
    html += yearChartsHTML(agg, st.months, chartSel, baseline);
  }

  const cuts = cutSuggestions(agg, YEAR_LENS);
  if (cuts.length){
    html += '<div class="card"><h3>Where to cut</h3><p class="tiny" style="margin:0 0 6px">Most over their expected pace' + (YEAR_LENS === 'all' ? ' (all time' : ' in ' + esc(YEAR_LENS) + ' (') + ', full months only)</p>' +
      cuts.map((x) => '<div class="list-item" data-cat="' + esc(x.cat.id) + '"><span class="ic">' + esc(x.cat.icon || '•') + '</span>' +
        '<div class="body"><div class="t1">' + esc(x.cat.name) + '</div><div class="t2">' + fmt$(x.ytd) + ' spent vs ' + fmt$(x.expected) + ' expected</div></div>' +
        '<span class="amt" style="color:var(--status-crit)">+' + fmt$(x.over) + '</span></div>').join('') + '</div>';
  } else if (st.fullMonths.length){
    html += '<div class="card"><h3>Where to cut</h3><p class="muted" style="margin:0">Nothing is over its expected pace' +
      (baseline ? '' : ' — set budgets or a baseline to sharpen this') + '. 👏</p></div>';
  }

  // Grouped by section (Money in · each expense group · Invested) — far easier to
  // scan than one flat list.
  const gc = groupedCatHTML(st.byCat, st.incomeByCat, st.investByCat, { pfx: 'y' });
  if (gc)
    html += '<div class="card"><h3>' + esc(yearLabel(YEAR_LENS)) + ' by category</h3>' +
      '<p class="tiny" style="margin:0 0 4px">Tap a group or subcategory to expand · tap a category to open it</p>' +
      gc + '</div>';

  html += '<div class="card"><h3>Month by month</h3>' + st.perMonth.slice().reverse().map((m) =>
    '<div class="list-item" data-ym="' + m.ym + '"><div class="body"><div class="t1">' + fmtMonth(m.ym) + '</div>' +
    '<div class="t2">out ' + fmt$(m.spend) + ' · in ' + fmt$(m.income) + '</div></div>' +
    '<span class="amt" style="color:' + (m.net >= 0 ? 'var(--status-good)' : 'var(--status-crit)') + '">' + fmt$(m.net, { signed: true }) + '</span>' +
    '<span class="menu-chev">›</span></div>').join('') +
    '<p class="tiny" style="margin:8px 0 0">Tap a month for its full breakdown — budgets, categories, gifts, alcohol, groceries…</p></div>';

  html += '<button class="btn btn-primary btn-block" data-x="import" style="margin-bottom:16px">📥 Import statements</button>';
  c.innerHTML = html;

  c.querySelector('[data-x=prev]').onclick = () => { YEAR_LENS = yearSeq[yi - 1]; renderHome(); };
  c.querySelector('[data-x=next]').onclick = () => { YEAR_LENS = yearSeq[yi + 1]; renderHome(); };
  c.querySelector('[data-x=ysel]').onchange = (e) => { YEAR_LENS = e.target.value; renderHome(); };
  const on = (sel, fn) => { const n2 = c.querySelector(sel); if (n2) n2.onclick = fn; };
  on('[data-x=rev]', () => showTab('review'));
  on('[data-x=import]', () => openScreen('Import', renderImportScreen));
  on('[data-x=bal]', () => openScreen('Accounts', renderAccountsScreen));

// Monthly bars for one category with a dashed budget line. Over-budget months are
// red, under are green. months = Jan–Dec (a partial year still shows the whole axis).
function catBarChartHTML(months, vals, budget, curYM){
  const n = months.length;
  const padT = 16, padB = 22, padL = 6, padR = 6;
  const W = Math.max(340, n * 34), H = 170;
  let maxV = Math.max(1, budget);
  for (const v of vals) maxV = Math.max(maxV, v);
  const colW = (W - padL - padR) / n, barW = Math.max(5, Math.min(22, colW - 8)), baseY = H - padB;
  const yS = (v) => padT + (1 - v / maxV) * (H - padT - padB);
  let s = '';
  for (let gi = 1; gi <= 3; gi++){ const gy = yS(maxV * gi / 4).toFixed(1); s += '<line x1="' + padL + '" y1="' + gy + '" x2="' + (W - padR) + '" y2="' + gy + '" stroke="var(--line)"/>'; }
  months.forEach((ym, i) => {
    const cx = padL + i * colW + colW / 2, v = vals[i], over = budget > 0 && v > budget;
    const color = over ? 'var(--status-crit)' : 'var(--viz-2)';
    const tip = fmtMonth(ym) + ' · <b>' + fmt$(v) + '</b>' + (budget > 0 ? (over ? ' · <span style="color:var(--status-crit)">' + fmt$(v - budget) + ' over</span>' : ' · ' + fmt$(budget - v) + ' under') : '');
    s += '<rect data-tip="' + esc(tip) + '" x="' + (padL + i * colW).toFixed(1) + '" y="0" width="' + colW.toFixed(1) + '" height="' + H + '" fill="transparent" pointer-events="all"/>';
    if (v > 0) s += barPath(cx - barW / 2, yS(v), barW, baseY - yS(v), color, over ? 0.95 : 0.72, ' pointer-events="none"');
    if (n <= 12 || i % 2 === 0) s += '<text x="' + cx.toFixed(1) + '" y="' + (H - 6) + '" text-anchor="middle" font-size="10" fill="' + (ym === curYM ? 'var(--accent)' : 'var(--faint)') + '" pointer-events="none">' + fmtMonth(ym).slice(0, 3) + '</text>';
  });
  if (budget > 0){ const by = yS(budget); s += '<line x1="' + padL + '" y1="' + by.toFixed(1) + '" x2="' + (W - padR) + '" y2="' + by.toFixed(1) + '" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="5 3"/>' +
    '<text x="' + (W - padR) + '" y="' + (by - 4).toFixed(1) + '" text-anchor="end" font-size="9" fill="var(--accent)">budget ' + fmt$(budget) + '</text>'; }
  return '<div class="chart-wrap"><svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" xmlns="http://www.w3.org/2000/svg">' + s + '</svg></div>';
}
// Popup for one category (from the Home "by category" breakdown). Income → an
// over-time line; expense → monthly spend bars vs the budget so you see over/under.
function openCategoryModal(catId){

function renderCategoryModal(c, catId, close){
  const cat = DATA.cats[catId];
  if (!cat){ if (close) close(); return; }
  const kind = cat.kind || 'expense';
  const agg = buildMonthAgg();
  const years = dataYearList(), yearSeq = ['all'].concat(years);
  const yi = yearSeq.indexOf(YEAR_LENS) < 0 ? 0 : yearSeq.indexOf(YEAR_LENS);
  const st = yearStats(agg, YEAR_LENS);
  const months = st.months, cur = currentYM();
  const mapKey = kind === 'income' ? 'income' : kind === 'invest' ? 'invest' : 'spend';
  const monthVal = (ym) => { const a = agg[ym]; return a && a[mapKey] ? (a[mapKey][catId] || 0) : 0; };
  const firstData = Object.keys(agg).sort()[0] || cur;
  const vals = months.map(monthVal);
  const total = vals.reduce((s, v) => s + v, 0);
  const fullVals = st.fullMonths.map(monthVal);
  const avgMo = st.fullMonths.length ? Math.round(fullVals.reduce((s, v) => s + v, 0) / st.fullMonths.length) : 0;
  const cl = catLabel(catId);

  let html = '<div class="modal-closebar"><button class="btn btn-sm" data-x="mclose">✕ Close</button>' +
    '<b>' + esc(cl.icon) + ' ' + esc(cl.name) + '</b><div style="width:64px"></div></div>';
  html += '<div class="month-nav"><button data-x="yprev"' + (yi <= 0 ? ' disabled' : '') + '>‹</button>' +
    '<select data-x="ysel" class="ynav-sel">' + yearSeq.map((y) => '<option value="' + y + '"' + (y === YEAR_LENS ? ' selected' : '') + '>' + esc(yearLabel(y)) + '</option>').join('') + '</select>' +
    '<button data-x="ynext"' + (yi >= yearSeq.length - 1 ? ' disabled' : '') + '>›</button></div>';

  if (kind === 'expense'){
    const baseline = baselineByCat(agg);
    const bf = budgetFor(catId, baseline);
    const budget = bf ? bf.amt : 0;
    const overMonths = st.fullMonths.filter((ym) => budget > 0 && monthVal(ym) > budget).length;
    html += '<div class="card"><div class="bl-row">' +
      '<div class="bl-tile"><div class="bl-v">' + fmt$(total) + '</div><div class="bl-l">Spent</div></div>' +
      '<div class="bl-tile"><div class="bl-v">' + fmt$(avgMo) + '</div><div class="bl-l">Avg / mo</div></div>' +
      '<div class="bl-tile"><div class="bl-v"' + (budget ? '' : ' style="color:var(--faint)"') + '>' + (budget ? fmt$(budget) : '—') + '</div><div class="bl-l">Budget / mo</div></div></div>' +
      (budget ? '<p class="tiny" style="margin:9px 0 0;text-align:center">' + (overMonths ? '<span style="color:var(--status-crit)">Over budget in ' + overMonths + ' of ' + st.fullMonths.length + ' months</span>' : '<span style="color:var(--status-good)">Under budget every month 👏</span>') + '</p>'
              : '<p class="tiny" style="margin:9px 0 0;text-align:center;color:var(--faint)">No budget set — add one in Budgets to see over/under.</p>') +
      '</div>';
    html += '<div class="card"><h3>Spend by month' + (YEAR_LENS !== 'all' ? ' · ' + esc(YEAR_LENS) : '') + '</h3>' + catBarChartHTML(months, vals, budget, cur) +
      '<div class="legend"><span><i style="background:var(--viz-2)"></i>Under budget</span><span><i style="background:var(--status-crit)"></i>Over budget</span><span><i style="background:var(--accent)"></i>Budget</span></div></div>';
  } else {
    // Income / investment: value over time (each month's amount, with a trendline).
    const pts = months.map((ym) => ({ ym, bal: (ym >= firstData && ym <= cur) ? monthVal(ym) : null }));
    html += '<div class="card"><div class="bl-row">' +
      '<div class="bl-tile"><div class="bl-v amt-pos">' + fmt$(total) + '</div><div class="bl-l">' + (kind === 'invest' ? 'Invested' : 'Received') + '</div></div>' +
      '<div class="bl-tile"><div class="bl-v">' + fmt$(avgMo) + '</div><div class="bl-l">Avg / mo</div></div></div></div>';
    const chart = balanceChartHTML(pts);
    if (chart) html += '<div class="card"><h3>' + (kind === 'invest' ? 'Invested' : 'Income') + ' by month' + (YEAR_LENS !== 'all' ? ' · ' + esc(YEAR_LENS) : '') + '</h3>' + chart +
      '<div class="legend"><span><i style="background:var(--viz-2)"></i>' + (kind === 'invest' ? 'Invested' : 'Income') + '/mo</span><span><i style="background:var(--accent)"></i>Trend</span></div></div>';
  }

  // Month by month list (latest first), over/under flag for expenses.
  const rows = st.perMonth.filter((mm) => agg[mm.ym]).slice().reverse();
  if (rows.length){
    const budget2 = kind === 'expense' ? (() => { const bf = budgetFor(catId, baselineByCat(agg)); return bf ? bf.amt : 0; })() : 0;
    html += '<div class="card"><h3>Month by month</h3>' + rows.map((mm) => {
      const v = monthVal(mm.ym), over = budget2 > 0 && v > budget2 && mm.ym < cur;
      return '<div class="list-item" style="cursor:default"><div class="body"><div class="t1">' + fmtMonth(mm.ym) + '</div>' +
        (budget2 > 0 && mm.ym < cur ? '<div class="t2" style="color:' + (over ? 'var(--status-crit)' : 'var(--status-good)') + '">' + (over ? fmt$(v - budget2) + ' over' : fmt$(budget2 - v) + ' under') + '</div>' : '') + '</div>' +
        '<span class="amt"' + (kind === 'income' ? ' style="color:var(--status-good)"' : '') + '>' + fmt$(v) + '</span></div>';
    }).join('') + '</div>';
  }

  html += '<div class="row" style="margin-bottom:16px"><button class="btn grow" data-x="edit">⚙️ Edit category</button>' +
    '<button class="btn btn-primary grow" data-x="acts">See transactions →</button></div>';
  c.innerHTML = html;

  const q = (s) => c.querySelector(s);
  q('[data-x=mclose]').onclick = () => close && close();
  q('[data-x=yprev]').onclick = () => { YEAR_LENS = yearSeq[yi - 1]; renderCategoryModal(c, catId, close); };
  q('[data-x=ynext]').onclick = () => { YEAR_LENS = yearSeq[yi + 1]; renderCategoryModal(c, catId, close); };
  q('[data-x=ysel]').onchange = (e) => { YEAR_LENS = e.target.value; renderCategoryModal(c, catId, close); };
  q('[data-x=edit]').onclick = () => openCatEditor(catId, () => { if (DATA.cats[catId]) renderCategoryModal(c, catId, close); else if (close) close(); });
  q('[data-x=acts]').onclick = () => { if (close) close(); ACT.cat = catId; ACT.acct = null; actSetMonth(null); showTab('activity'); };
  bindChartTips(c);
}

function renderAccountModal(c, acctId, close){
  const a = DATA.accounts[acctId];
  if (!a){ if (close) close(); return; }
  const agg = buildMonthAgg(acctId);
  // Use the GLOBAL year set so the shared lens carries in from Home even if this
  // account had no activity that year (it just shows empty for that year).
  const years = dataYearList();
  const yearSeq = ['all'].concat(years);
  const yi = yearSeq.indexOf(YEAR_LENS) < 0 ? 0 : yearSeq.indexOf(YEAR_LENS);
  const st = yearStats(agg, YEAR_LENS);
  const isBtc = a.type === 'btc';

  let html = '<div class="modal-closebar"><button class="btn btn-sm" data-x="mclose">✕ Close</button>' +
    '<b>' + acctIcon(a.type) + ' ' + esc(a.name) + '</b><div style="width:64px"></div></div>';

  // Shared year lens — scopes EVERYTHING below (charts, tiles, tables) to the year.
  html += '<div class="month-nav"><button data-x="yprev"' + (yi <= 0 ? ' disabled' : '') + '>‹</button>' +
    '<select data-x="ysel" class="ynav-sel">' + yearSeq.map((y) => '<option value="' + y + '"' + (y === YEAR_LENS ? ' selected' : '') + '>' + esc(yearLabel(y)) + '</option>').join('') + '</select>' +
    '<button data-x="ynext"' + (yi >= yearSeq.length - 1 ? ' disabled' : '') + '>›</button></div>';

  // Balance / holdings header.
  if (isBtc){
    if (BTC_PRICE == null || Date.now() - (BTC_PRICE.at || 0) > 300000) refreshBtcPrice().then((r) => { if (r.changed && DATA.accounts[acctId]) renderAccountModal(c, acctId, close); });
    const scoped = YEAR_LENS !== 'all';
    const bs = btcSeries(acctId, YEAR_LENS);
    // Stats: all-time = live; a specific year = the state at the END of that year
    // (cumulative holdings/cost carry in), read off the last scoped point.
    let b;
    if (!scoped){ b = btcStats(acctId); }
    else { const kp = bs.pts.filter((p) => p.sats != null); const lp = kp[kp.length - 1];
      if (lp){ const btc = lp.sats / 1e8; b = { sats: lp.sats, btc, invested: lp.invested, value: lp.value, price: lp.price, avgCost: btc > 0 ? Math.round(lp.invested / btc) : 0 }; }
      else { b = { sats: 0, btc: 0, invested: 0, value: 0, price: (BTC_PRICE ? BTC_PRICE.usd : null), avgCost: 0 }; } }
    const gain = b.value != null ? b.value - b.invested : null;
    const gainPct = (gain != null && b.invested > 0) ? Math.round(1000 * gain / b.invested) / 10 : null;
    const gc2 = gain != null ? (gain >= 0 ? 'var(--status-good)' : 'var(--status-crit)') : 'var(--text)';
    const BTC_ORANGE = '#f7931a';
    const valLbl = scoped ? 'Value' : 'Current value', priceLbl = scoped ? 'Price' : 'BTC price';
    // Headline: holdings, value, gain/loss.
    html += '<div class="card"><div class="bl-row">' +
      '<div class="bl-tile"><div class="bl-v" style="color:' + BTC_ORANGE + '">' + b.btc.toLocaleString('en-US', { maximumFractionDigits: 8 }) + ' ₿</div><div class="bl-l">Bitcoin</div></div>' +
      '<div class="bl-tile"><div class="bl-v">' + (b.value != null ? fmt$(b.value) : '—') + '</div><div class="bl-l">' + valLbl + '</div></div>' +
      '<div class="bl-tile"><div class="bl-v" style="color:' + gc2 + '">' + (gain != null ? fmt$(gain, { signed: true }) : '—') + '</div><div class="bl-l">Gain / loss</div></div></div>' +
      // Second row: invested, avg buy price, price.
      '<div class="bl-row" style="margin-top:8px">' +
      '<div class="bl-tile"><div class="bl-v">' + fmt$(b.invested) + '</div><div class="bl-l">Invested</div></div>' +
      '<div class="bl-tile"><div class="bl-v">' + (b.avgCost ? fmt$(b.avgCost) : '—') + '</div><div class="bl-l">Avg buy price</div></div>' +
      '<div class="bl-tile"><div class="bl-v" style="color:' + BTC_ORANGE + '">' + (b.price ? fmt$(b.price) : '…') + '</div><div class="bl-l">' + priceLbl + '</div></div></div>' +
      (gainPct != null ? '<p class="tiny" style="margin:9px 0 0;text-align:center">' + (gain >= 0 ? '▲' : '▼') + ' <b style="color:' + gc2 + '">' + (gainPct >= 0 ? '+' : '') + gainPct + '%</b> on your ' + fmt$(b.invested) + ' invested' + (b.price ? (scoped ? ' · ' + fmt$(b.price) + '/₿ at year-end' : ' · live spot ' + fmt$(b.price) + '/₿') : '') + '</p>' : '') +
      (scoped ? '<p class="tiny" style="margin:4px 0 0;text-align:center;color:var(--faint)">As of end of ' + esc(YEAR_LENS) + ' — switch the year above for all-time.</p>' : '') +
      '</div>';

    // Charts: holdings (₿) over time, and value vs invested ($) over time.
    if (bs.pts.length >= 2){
      const months = bs.pts.map((p) => p.ym);
      const holdChart = miniLineChart(months, [{ name: 'Holdings', color: BTC_ORANGE, area: true, vals: bs.pts.map((p) => p.sats) }], (v) => (v / 1e8).toLocaleString('en-US', { maximumFractionDigits: 8 }) + ' ₿', { min: 0 });
      html += '<div class="card"><h3>Bitcoin holdings over time' + (scoped ? ' · ' + esc(YEAR_LENS) : '') + '</h3>' + holdChart +
        '<div class="legend"><span><i style="background:' + BTC_ORANGE + '"></i>BTC accumulated</span></div>' +
        '<div class="chart-caption" style="min-height:0"><span style="color:var(--faint)">Stacked ' + b.btc.toLocaleString('en-US', { maximumFractionDigits: 8 }) + ' ₿ ' + (scoped ? 'by end of ' + esc(YEAR_LENS) : 'so far') + '.</span></div></div>';
      const valChart = miniLineChart(months, [
        { name: 'Value', color: 'var(--viz-2)', area: true, vals: bs.pts.map((p) => p.value) },
        { name: 'Invested', color: 'var(--faint)', vals: bs.pts.map((p) => p.invested) },
      ], (v) => fmt$(v), { min: 0 });
      html += '<div class="card"><h3>Value vs invested over time' + (scoped ? ' · ' + esc(YEAR_LENS) : '') + '</h3>' + valChart +
        '<div class="legend"><span><i style="background:var(--viz-2)"></i>Value</span><span><i style="background:var(--faint)"></i>Cost basis</span></div>' +
        '<div class="chart-caption" style="min-height:0"><span style="color:var(--faint)">Value uses a price curve reconstructed from your buy prices + live spot — an estimate between purchases.</span></div></div>';
    } else if (scoped){
      html += '<div class="card"><p class="muted" style="margin:0">No Bitcoin holdings to chart in ' + esc(YEAR_LENS) + '.</p></div>';
    }
  } else {
    const bal = accountBalance(a);
    const ser = accountBalanceSeries(a, YEAR_LENS), pts = ser.pts;
    const kpts = pts.filter((p) => p.bal != null); // known (non-gap) months

        '<p class="tiny" style="margin:8px 0 0">' + esc(acctTypeLabel(a.type)) + ' · ' + fmtMonth(kpts[0].ym) + ' → ' + fmtMonth(kpts[kpts.length - 1].ym) + '</p></div>';
    } else if (YEAR_LENS !== 'all' && !kpts.length){
      // Selected year predates this account's activity — don't pass off today's

      html += '<div class="card"><p class="muted" style="margin:0">No activity for this account in ' + esc(YEAR_LENS) + '.' +

    } else {
      html += '<div class="card"><div class="row"><span class="grow"><b>Current balance</b><div class="tiny">' + esc(acctTypeLabel(a.type)) + '</div></span>' +
        (bal == null ? '<a data-x="setbal" style="cursor:pointer;color:var(--accent)">Set balance ›</a>'
                     : '<b style="font-size:18px' + (bal < 0 ? ';color:var(--status-crit)' : '') + '">' + fmt$(bal) + '</b>') + '</div>' +
        (bal == null ? '<p class="tiny" style="margin:8px 0 0">Set a balance to turn the trend below into real dollar amounts.</p>' : '') + '</div>';
    }
    // Balance-over-time chart with a trendline.
    const chart = balanceChartHTML(pts);
    if (chart){

        (ser.anchored ? '' : ' · set a balance for real dollar amounts') + '</span></div></div>';
    }
  }

  // Cash-flow sections (In/Out/Net, categories, months) — not for a Bitcoin stack.

  if (!isBtc){

function renderMonthScreen(c, close){
  const agg = buildMonthAgg();
  if (!UI.month) UI.month = currentYM();
  const ym = UI.month;
  const mAgg = agg[ym] || { spend: {}, income: {}, invest: {}, spendTotal: 0, incomeTotal: 0, investTotal: 0, incomeRecur: 0, spendOneTime: 0 };
  const baseline = baselineByCat(agg);
  const st = yearStats(agg, ym.slice(0, 4));

  const mNet = (mAgg.incomeTotal || 0) - (mAgg.spendTotal || 0);
  const mRecurIn = mAgg.incomeRecur || 0, mOneIn = (mAgg.incomeTotal || 0) - mRecurIn;
  const mRecurSp = (mAgg.spendTotal || 0) - (mAgg.spendOneTime || 0), mOneSp = mAgg.spendOneTime || 0;

  let html = '';
  if (close) html += '<div class="modal-closebar"><button class="btn btn-sm" data-x="mclose">✕ Close</button><b>' + fmtMonth(ym) + '</b><div style="width:64px"></div></div>';
  html += '<div class="month-nav"><button data-x="prev">‹</button><b>' + fmtMonth(ym) + '</b>' +
    '<button data-x="next"' + (ym >= currentYM() ? ' disabled' : '') + '>›</button></div>';

  // Headline: money in / out / net for the month.
  html += '<div class="stat-grid" style="margin-bottom:10px">' +
    '<div class="stat"><div class="v amt-pos">' + fmt$(mAgg.incomeTotal || 0) + '</div><div class="l">Money in</div></div>' +
    '<div class="stat"><div class="v">' + fmt$(mAgg.spendTotal || 0) + '</div><div class="l">Money out</div></div></div>' +
    '<div class="card"><div class="row"><span class="grow"><b>Net this month</b></span>' +
    '<b style="font-size:18px;color:' + (mNet >= 0 ? 'var(--status-good)' : 'var(--status-crit)') + '">' + fmt$(mNet, { signed: true }) + '</b></div>' +
    ((mOneIn || mOneSp)
      ? '<p class="tiny" style="margin:6px 0 0">Recurring ' + fmt$(mRecurIn) + ' in · ' + fmt$(mRecurSp) + ' out &nbsp;·&nbsp; One-off ' + fmt$(mOneIn) + ' in · ' + fmt$(mOneSp) + ' out</p>'
      : '') +
    ((mAgg.investTotal || 0) > 0 ? '<p class="tiny" style="margin:4px 0 0;color:var(--blue)">📈 Invested ' + fmt$(mAgg.investTotal) + ' — separate from spending</p>' : '') +
    '</div>';

  // How this month compares to the year's average month (full months only).
  const denom = Math.max(1, st.fullMonths.length || st.months.length);
  const avgSp = Math.round(st.spend / denom), avgIn = Math.round(st.income / denom);
  const cmp = (val, avg, lowerIsBetter) => {
    if (!avg) return '';
    const d = val - avg, pct = Math.round(100 * d / avg);
    const good = lowerIsBetter ? d <= 0 : d >= 0;
    return '<span style="color:' + (good ? 'var(--status-good)' : 'var(--status-crit)') + '">' + (d >= 0 ? '+' : '−') + Math.abs(pct) + '%</span>';
  };
  html += '<div class="card"><h3>vs your average month</h3>' +
    '<div class="row"><span class="grow muted">Spent ' + fmt$(mAgg.spendTotal || 0) + ' vs ' + fmt$(avgSp) + ' avg</span>' + cmp(mAgg.spendTotal || 0, avgSp, true) + '</div>' +
    '<div class="row" style="margin-top:4px"><span class="grow muted">Income ' + fmt$(mAgg.incomeTotal || 0) + ' vs ' + fmt$(avgIn) + ' avg</span>' + cmp(mAgg.incomeTotal || 0, avgIn, false) + '</div></div>';

  // Account balances: end-of-month balance + this month's change, per account.
  {
    const eom = ym + '-31', prev = shiftYM(ym, -1) + '-31';
    const rows = [];
    for (const a of liveAccounts()){
      const end = accountBalanceAt(a, eom);
      if (end == null) continue;
      const start = accountBalanceAt(a, prev);
      rows.push({ a, end, delta: end - start });
    }
    if (rows.length){
      html += '<div class="card"><h3>Account balances · end of ' + fmtMonth(ym) + '</h3>' +
        rows.map((r) => '<div class="list-item" data-aidm="' + esc(r.a.id) + '"><span class="ic">' + acctIcon(r.a.type) + '</span>' +
          '<div class="body"><div class="t1">' + esc(r.a.name) + '</div><div class="t2">' + (r.delta >= 0 ? '+' : '−') + fmt$(Math.abs(r.delta)) + ' this month</div></div>' +
          '<span class="amt"' + (r.end < 0 ? ' style="color:var(--status-crit)"' : '') + '>' + fmt$(r.end) + '</span></div>').join('') + '</div>';
    }
  }

  // Full grouped breakdown — money in AND money out AND invested (collapsible tree).
  const gc = groupedCatHTML(mAgg.spend, mAgg.income, mAgg.invest, { pfx: 'm' });
  if (gc) html += '<div class="card"><h3>' + fmtMonth(ym) + ' by category</h3>' + gc + '</div>';
  else html += '<div class="empty">No activity in ' + fmtMonth(ym) + '.</div>';

  html += monthVsBaselineHTML(agg, ym, baseline);
  html += '<button class="btn btn-block" data-x="alla" style="margin-bottom:16px">Open ' + fmtMonth(ym) + ' in Activity →</button>';
  c.innerHTML = html;

  const nav = (fn) => { if (close) close(); fn(); }; // leave the popup before switching tabs
  c.querySelector('[data-x=prev]').onclick = () => { UI.month = shiftYM(ym, -1); renderMonthScreen(c, close); };
  c.querySelector('[data-x=next]').onclick = () => { UI.month = shiftYM(ym, 1); renderMonthScreen(c, close); };
  const on = (sel, fn) => { const n2 = c.querySelector(sel); if (n2) n2.onclick = fn; };
  on('[data-x=mclose]', () => close && close());
  on('[data-x=alla]', () => nav(() => { actSetMonth(ym); ACT.cat = null; showTab('activity'); }));
  on('[data-x=gob]', () => nav(() => openScreen('Budgets & Baseline', renderBudgetsScreen)));
  c.querySelectorAll('[data-aidm]').forEach((n2) => { n2.onclick = () => openAccountEditor(n2.dataset.aidm, () => renderMonthScreen(c, close)); });
  c.querySelectorAll('[data-btog]').forEach((r) => {
    r.onclick = () => { const k = r.dataset.btog; if (BREAKDOWN_OPEN.has(k)) BREAKDOWN_OPEN.delete(k); else BREAKDOWN_OPEN.add(k); renderMonthScreen(c, close); };
  });
  c.querySelectorAll('.tree-row[data-cat]').forEach((n2) => {
    n2.onclick = () => {
      if (n2.dataset.cat === '__uncat'){ nav(() => showTab('review')); return; }
      ACT.cat = n2.dataset.cat; actSetMonth(ym); nav(() => showTab('activity'));
    };
  });
}

// Manual verification: walk every non-excluded transaction in a chosen window,
// confirm each is correct. A t.verified timestamp tracks what's been validated.
function verifyPool(){
  return liveTxns().filter((t) => t.status !== 'excluded' &&
    (!REVIEW.month || ymOf(t.date) === REVIEW.month) &&
    (!REVIEW.acct || t.acct === REVIEW.acct));
}
function renderVerifyMode(c){
  const months = dataMonths();
  const accts = liveAccounts();
  const pool = verifyPool();
  const done = pool.filter((t) => t.verified).length;

  let head = '<div class="month-strip">' +
    '<span class="chip' + (!REVIEW.month ? ' on' : '') + '" data-mv="">All months</span>' +

  function bind(){
    c.querySelectorAll('[data-mv]').forEach((ch) => { ch.onclick = () => { REVIEW.month = ch.dataset.mv || null; renderVerifyMode(c); }; });

  const t = queue[0];

      '<div class="muted" style="margin-bottom:14px">' + fmtDate(t.date) + ' · ' + esc(accountName(t.acct)) + '</div>' +
      '<div class="card" style="background:var(--card2);margin-bottom:12px"><div class="list-item" data-x="cat" style="padding:6px 2px">' +
        '<span class="ic">' + cl.icon + '</span><div class="body"><div class="t1">' + esc(cl.name) + '</div>' +
        '<div class="t2">Category — tap to change</div></div><span class="menu-chev">›</span></div></div>' +
      (() => {
        // Only prompt about future-estimate inclusion where the answer isn't
        // obvious: income, one-time-eligible categories, or already-overridden.
        const primary = t.cat || (t.splits && t.splits[0] && t.splits[0].cat) || '__uncat';
        const cc = DATA.cats[primary];

        if (!relevant) return '';

      })() +

  bind();
  const q = (s) => c.querySelector(s);

  q('[data-x=ok]').onclick = verifyAdvance;

    if (t.splits && t.splits.length){
      if (!(await confirmDlg('Replace the existing split with one category?', 'Replace'))) return;

  };
  q('[data-x=flip]').onclick = () => {
    t.amt = -t.amt;
    if (t.btc) t.btc = -t.btc; // BTC follows the cash direction

  q('[data-x=split]').onclick = () => openSplitEditor(t);
  q('[data-x=edit]').onclick = () => openTxnEditor(t.id);
  q('[data-x=transfer]').onclick = () => { t.cat = 'sys-transfer'; t.splits = null; if (t.status === 'review') t.status = 'ok'; put('txns', t); renderVerifyMode(c); };

  if (pfin) pfin.onclick = () => { t.projFuture = true; put('txns', t); renderVerifyMode(c); };
  if (pfout) pfout.onclick = () => { t.projFuture = false; put('txns', t); renderVerifyMode(c); };
}

/* ---- §Activity ---- */
function actFiltered(){
  const q = ACT.q.trim().toUpperCase();
  return liveTxns().filter((t) => {
    if (ACT.acct && t.acct !== ACT.acct) return false;
    if (ACT.year && ymOf(t.date).slice(0, 4) !== ACT.year) return false;
    if (ACT.mo && ymOf(t.date).slice(5, 7) !== ACT.mo) return false;
    if (ACT.status && t.status !== ACT.status) return false;
    if (ACT.cat){
      if (!effParts(t).some((p) => catValueMatches(p.cat, ACT.cat))) return false;
    }
    if (q && !(t.m.includes(q) || t.mraw.toUpperCase().includes(q) || (t.note || '').toUpperCase().includes(q))) return false;
    return true;
  }).sort((x, y) => (x.date < y.date ? 1 : x.date > y.date ? -1 : 0));
}
// Years present in the data, newest first.

  return Array.from(new Set(liveTxns().map((t) => ymOf(t.date).slice(0, 4)))).sort().reverse();
}

function barPath(x, yTop, w, hgt, color, opacity, attrs){
  if (hgt <= 0.5) return '';
  const r = Math.min(3, w / 2, hgt);
  return '<path d="M' + x.toFixed(1) + ',' + (yTop + hgt).toFixed(1) +
    ' L' + x.toFixed(1) + ',' + (yTop + r).toFixed(1) +
    ' Q' + x.toFixed(1) + ',' + yTop.toFixed(1) + ' ' + (x + r).toFixed(1) + ',' + yTop.toFixed(1) +
    ' L' + (x + w - r).toFixed(1) + ',' + yTop.toFixed(1) +
    ' Q' + (x + w).toFixed(1) + ',' + yTop.toFixed(1) + ' ' + (x + w).toFixed(1) + ',' + (yTop + r).toFixed(1) +
    ' L' + (x + w).toFixed(1) + ',' + (yTop + hgt).toFixed(1) + ' Z" fill="' + color + '" opacity="' + opacity + '"' + (attrs || '') + '/>';
}
// Wire hover tooltips for any [data-tip] element inside a chart wrapper. The tip
// lives on the (non-clipping) card and clamps to its bounds so it's never cut off.
function bindChartTips(container){
  container.querySelectorAll('.chart-wrap').forEach((wrap) => {
    const card = wrap.closest('.card') || wrap;
    card.style.position = 'relative';
    let tip = card.querySelector('.chart-tip');
    if (!tip){ tip = el('div', { class: 'chart-tip' }); card.appendChild(tip); }
    const move = (e) => {
      const t = e.target.closest ? e.target.closest('[data-tip]') : null;
      const d = t && t.getAttribute('data-tip');
      if (!d){ tip.style.display = 'none'; return; }
      tip.innerHTML = d; tip.style.display = 'block';
      const cr = card.getBoundingClientRect();
      const cx = (e.touches ? e.touches[0].clientX : e.clientX) - cr.left;
      const cy = (e.touches ? e.touches[0].clientY : e.clientY) - cr.top;
      const tw = tip.offsetWidth, th = tip.offsetHeight;
      const left = Math.max(tw / 2 + 6, Math.min(cr.width - tw / 2 - 6, cx));
      if (cy - th - 16 < 0){ tip.style.transform = 'translate(-50%, 12px)'; } // flip below near the top
      else { tip.style.transform = 'translate(-50%, -125%)'; }
      tip.style.left = left + 'px'; tip.style.top = cy + 'px';
    };
    wrap.addEventListener('pointermove', move);
    wrap.addEventListener('pointerleave', () => { tip.style.display = 'none'; });
  });
}
// Balance-over-time line chart with a dashed linear-regression trendline. `pts` is
// [{ym, bal}]. Caller binds hover via bindChartTips (full-height [data-tip] rects).
function balanceChartHTML(pts){
  if (!pts || pts.length < 2) return '';
  const n = pts.length;
  // Known points (bal != null) keep their real index i, so gaps (months with no
  // data) leave the x-slot on the axis but draw no line/marker there.
  const known = pts.map((p, i) => ({ i, v: p.bal })).filter((o) => o.v != null);
  if (known.length < 2) return '';
  const vals = known.map((o) => o.v);
  const padT = 16, padB = 22, padL = 6, padR = 6;
  const W = Math.max(340, n * 34), H = 170;
  const kn = known.length, meanX = known.reduce((s2, o) => s2 + o.i, 0) / kn, meanY = vals.reduce((a, b) => a + b, 0) / kn;
  let num = 0, den = 0;
  for (const o of known){ num += (o.i - meanX) * (o.v - meanY); den += (o.i - meanX) * (o.i - meanX); }
  const slope = den ? num / den : 0, intercept = meanY - slope * meanX;
  const first = known[0].i, last = known[known.length - 1].i;
  const t0 = intercept + slope * first, t1 = intercept + slope * last;
  let lo = Math.min.apply(null, vals.concat([t0, t1])), hi = Math.max.apply(null, vals.concat([t0, t1]));
  if (lo === hi){ const b = Math.max(1, Math.abs(lo) * 0.1); hi = lo + b; lo -= b; }
  const pad = (hi - lo) * 0.12; lo -= pad; hi += pad;
  const plotW = W - padL - padR, step = plotW / (n - 1);
  const xF = (i) => padL + i * step;
  const yF = (v) => padT + (1 - (v - lo) / (hi - lo)) * (H - padT - padB);
  let s = '';
  for (let gi = 1; gi <= 3; gi++){
    const gy = yF(lo + (hi - lo) * gi / 4).toFixed(1);
    s += '<line x1="' + padL + '" y1="' + gy + '" x2="' + (W - padR) + '" y2="' + gy + '" stroke="var(--line)"/>';
  }
  if (lo < 0 && hi > 0){
    const zy = yF(0).toFixed(1);
    s += '<line x1="' + padL + '" y1="' + zy + '" x2="' + (W - padR) + '" y2="' + zy + '" stroke="var(--faint)" stroke-dasharray="2 3"/>';
  }
  const linePts = known.map((o) => xF(o.i).toFixed(1) + ',' + yF(o.v).toFixed(1));
  const baseY = yF(Math.max(lo, Math.min(hi, 0)));
  s += '<polygon points="' + xF(first).toFixed(1) + ',' + baseY.toFixed(1) + ' ' + linePts.join(' ') + ' ' + xF(last).toFixed(1) + ',' + baseY.toFixed(1) + '" fill="var(--viz-2)" opacity="0.10"/>';
  s += '<line x1="' + xF(first).toFixed(1) + '" y1="' + yF(t0).toFixed(1) + '" x2="' + xF(last).toFixed(1) + '" y2="' + yF(t1).toFixed(1) + '" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.75"/>';
  s += '<polyline points="' + linePts.join(' ') + '" fill="none" stroke="var(--viz-2)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  for (const o of known){
    s += '<circle cx="' + xF(o.i).toFixed(1) + '" cy="' + yF(o.v).toFixed(1) + '" r="3" fill="var(--viz-2)" stroke="var(--card)" stroke-width="1.5"/>';
  }
  const every = Math.max(1, Math.ceil(n / 12));
  pts.forEach((p, i) => {
    const x = xF(i);
    s += '<rect data-tip="' + esc(fmtMonth(p.ym) + ' · ' + (p.bal != null ? '<b>' + fmt$(p.bal) + '</b>' : 'no data')) + '" x="' + (x - step / 2).toFixed(1) + '" y="0" width="' + step.toFixed(1) + '" height="' + H + '" fill="transparent" pointer-events="all"/>';
    if (n <= 12 || i % every === 0 || i === n - 1)
      s += '<text x="' + x.toFixed(1) + '" y="' + (H - 6) + '" text-anchor="middle" font-size="10" fill="var(--faint)" pointer-events="none">' + fmtMonth(p.ym).slice(0, 3) + '</text>';
  });
  return '<div class="chart-wrap"><svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" xmlns="http://www.w3.org/2000/svg">' + s + '</svg></div>';
}
// Generic month-indexed multi-line chart. months: ['YYYY-MM',…]. series:
// [{name,color,vals,area?}]. fmtV(v) formats a value for the hover tooltip.
// opts: { min } forces a y-floor (e.g. 0). Caller wraps in a card + binds tips.
function miniLineChart(months, series, fmtV, opts){
  opts = opts || {};
  const n = months.length;
  if (n < 2 || !series.length) return '';
  const padT = 16, padB = 22, padL = 6, padR = 6;
  const W = Math.max(340, n * 34), H = 170;
  let lo = Infinity, hi = -Infinity;
  for (const se of series) for (const v of se.vals){ if (v == null) continue; if (v < lo) lo = v; if (v > hi) hi = v; }
  if (!isFinite(lo)){ lo = 0; hi = 1; }
  if (opts.min != null) lo = Math.min(lo, opts.min);
  if (lo === hi) hi = lo + Math.max(1, Math.abs(lo) * 0.1);
  const padv = (hi - lo) * 0.12 || 1; if (opts.min == null) lo -= padv; hi += padv;
  const step = (W - padL - padR) / (n - 1);
  const xF = (i) => padL + i * step;
  const yF = (v) => padT + (1 - (v - lo) / (hi - lo)) * (H - padT - padB);
  let s = '';
  for (let gi = 1; gi <= 3; gi++){ const gy = yF(lo + (hi - lo) * gi / 4).toFixed(1); s += '<line x1="' + padL + '" y1="' + gy + '" x2="' + (W - padR) + '" y2="' + gy + '" stroke="var(--line)"/>'; }
  for (const se of series){
    const pv = se.vals.map((v, i) => (v == null ? null : xF(i).toFixed(1) + ',' + yF(v).toFixed(1))).filter((x) => x);
    if (se.area && pv.length){ const b = yF(Math.max(lo, opts.min != null ? opts.min : lo)); s += '<polygon points="' + pv[0].split(',')[0] + ',' + b.toFixed(1) + ' ' + pv.join(' ') + ' ' + pv[pv.length - 1].split(',')[0] + ',' + b.toFixed(1) + '" fill="' + se.color + '" opacity="0.12"/>'; }
    s += '<polyline points="' + pv.join(' ') + '" fill="none" stroke="' + se.color + '" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
    const last = se.vals[n - 1]; if (last != null) s += '<circle cx="' + xF(n - 1).toFixed(1) + '" cy="' + yF(last).toFixed(1) + '" r="3.5" fill="' + se.color + '" stroke="var(--card)" stroke-width="1.5"/>';
  }
  const every = Math.max(1, Math.ceil(n / 8));
  months.forEach((ym, i) => {
    if (n <= 10 || i % every === 0 || i === n - 1) s += '<text x="' + xF(i).toFixed(1) + '" y="' + (H - 6) + '" text-anchor="middle" font-size="10" fill="var(--faint)" pointer-events="none">' + fmtMonth(ym).slice(0, 3) + '</text>';
    const tip = '<b>' + fmtMonth(ym) + '</b>' + series.map((se) => '<br>' + esc(se.name) + ' ' + (se.vals[i] == null ? '—' : fmtV(se.vals[i]))).join('');
    s += '<rect data-tip="' + esc(tip) + '" x="' + (xF(i) - step / 2).toFixed(1) + '" y="0" width="' + step.toFixed(1) + '" height="' + H + '" fill="transparent" pointer-events="all"/>';
  });
  return '<div class="chart-wrap"><svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" xmlns="http://www.w3.org/2000/svg">' + s + '</svg></div>';
}

    if (n <= 8 || i % 2 === 0 || ym === sel)

      '<text x="' + (W1 - padR) + '" y="' + (yS(baseline.total) - 4).toFixed(1) + '" text-anchor="end" font-size="9" fill="var(--faint)">baseline</text>';
  }

/* ---- Recurring screen ---- */
/* ---- §Recurring (main tab) ---- */
function renderRecurring(){ renderRecurringScreen($('#view-recurring')); }
const RECUR_OPEN = new Set(); // collapsible recurring tree: 'g:<gid>', 'sub:<gid>|<sub>', 'cat:<cid>'
// Which months of the year an item bills in, as a compact label. '' if every month.
const RECUR_MONTHS = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
function seasonMonthsLabel(cal){
  if (!cal || !cal.length || cal.length >= 12) return '';
  const sorted = cal.slice().sort((a, b) => a - b);
  const contiguous = sorted.every((m, i) => i === 0 || m === sorted[i - 1] + 1);
  if (contiguous && sorted.length > 1) return RECUR_MONTHS[sorted[0]] + '–' + RECUR_MONTHS[sorted[sorted.length - 1]];
  if (sorted.length <= 4) return sorted.map((m) => RECUR_MONTHS[m]).join(', ');
  return sorted.length + ' months a year';
}
// Honest cadence/pattern label for a recurring item's subtitle. Seasonal items
// name their active months + the per-active-month amount, so the annualized /mo
// figure on the right never reads as "this happens every month."
function recurCadenceLabel(r){
  let base;
  const sl = seasonMonthsLabel(r.activeCal);
  if (r.cadence === 'quarterly') base = 'quarterly · ~' + fmt$(r.perCharge) + '/qtr';
  else if (r.cadence === 'semiannual') base = 'twice a year · ~' + fmt$(r.perCharge);
  else if (r.cadence === 'yearly') base = 'yearly · ~' + fmt$(r.perCharge) + '/yr';
  else if (r.trulySeasonal) base = '🗓 ' + (sl || (r.monthsActive + ' of ' + r.span + ' mo')) + ' · ' + fmt$(r.perActiveMonth) + '/mo when active';
  else if (r.cadence === 'irregular') base = 'every ~' + Math.max(2, Math.round(r.span / r.monthsActive)) + ' mo';
  else base = 'monthly';
  if (!r.trulySeasonal && r.cadence === 'monthly' && r.min !== r.max) base += ' · ' + fmt$(r.min) + '–' + fmt$(r.max);
  return base;
}
// EVERY non-one-time expense category that has any spend history, amortized to a
// monthly figure — the complete recurring list. (detectRecurring is merchant-based
// and needs 3+ months per merchant, so it silently drops whole categories.) Seasonal
// cats spread their yearly cost over 12; the rest divide by the months of data we have.
function recurringCatData(){
  const agg = buildMonthAgg();
  const months = Object.keys(agg).sort();
  if (!months.length) return {};
  let lastYM = months[months.length - 1]; const cur = currentYM(); if (lastYM < cur) lastYM = cur; // run each category's span through today
  const out = {};
  for (const c of liveCats()){
    if ((c.kind || 'expense') !== 'expense') continue;
    if (catIsOneTime(c)) continue;
    const calAmt = {}, calCnt = {}; let total = 0, firstYM = null, active = 0, mn = Infinity, mx = 0;
    for (const ym of months){
      const v = agg[ym].spend[c.id] || 0;
      if (v <= 0) continue;
      total += v; active++; if (!firstYM) firstYM = ym; if (v < mn) mn = v; if (v > mx) mx = v;
      const cm = +ym.slice(5, 7); calAmt[cm] = (calAmt[cm] || 0) + v; calCnt[cm] = (calCnt[cm] || 0) + 1;
    }
    if (total <= 0) continue; // no activity history → not shown
    let observedTotal = 0; const activeCal = [];
    for (let cm = 1; cm <= 12; cm++){ if (calCnt[cm]){ calAmt[cm] = Math.round(calAmt[cm] / calCnt[cm]); observedTotal += calAmt[cm]; activeCal.push(cm); } }
    // Denominator = the category's OWN span (first time it appeared → the latest month
    // of data), NOT the whole window. So a mortgage present every month reads at its
    // real amount; only genuine gaps in a category's own life dilute it.
    const spanMonths = Math.max(active, monthDiff(firstYM, lastYM) + 1);
    const trulySeasonal = !!c.seasonal;
    out[c.id] = { cat: c.id, trulySeasonal, calAmt, activeCal, active, spanMonths,
                  annualizedMonthly: trulySeasonal ? Math.round(observedTotal / 12) : Math.round(total / spanMonths),
                  perActiveMonth: activeCal.length ? Math.round(observedTotal / activeCal.length) : 0,
                  min: mn === Infinity ? 0 : mn, max: mx };
  }
  return out;
}
// Honest pattern label for a category's recurring row.
function catRecurLabel(info){
  if (info.trulySeasonal){ const sl = seasonMonthsLabel(info.activeCal); return '🗓 ' + (sl || info.activeCal.length + ' mo/yr') + ' · ' + fmt$(info.perActiveMonth) + '/mo active'; }
  if (info.active >= info.spanMonths) return 'monthly' + (info.min !== info.max ? ' · ' + fmt$(info.min) + '–' + fmt$(info.max) : '');
  return 'seen ' + info.active + ' of ' + info.spanMonths + ' months';
}
function renderRecurringScreen(c){
  const catData = recurringCatData();
  const catIds = Object.keys(catData);
  const transfers = detectRecurring().filter((r) => r.kind === 'transfer');
  if (!catIds.length && !transfers.length){
    c.innerHTML = '<div class="empty">No recurring spending yet.<br><span class="tiny">Every category that isn’t marked one-time and has any history shows up here once you import or add transactions.</span></div>';
    return;
  }
  const catTotal = (cid) => (catData[cid] ? catData[cid].annualizedMonthly : 0);
  const grandTotal = catIds.reduce((s, cid) => s + catData[cid].annualizedMonthly, 0);

  // A tree row. tog → collapsible (data-rtog); catId → tappable to edit that
  // category (rename / mark seasonal / one-time); else a plain leaf.
  const trow = (icon, name, sub, amtStr, lvl, tog, open, catId) =>
    '<div class="tree-row ' + lvl + '"' + (tog ? ' data-rtog="' + esc(tog) + '" style="cursor:pointer"' : catId ? ' data-catedit="' + esc(catId) + '" style="cursor:pointer"' : ' style="cursor:default"') + '>' +
    '<span class="ic">' + icon + '</span><div class="body"><div class="t1">' + esc(name) + '</div>' +
    (sub ? '<div class="t2">' + esc(sub) + '</div>' : '') + '</div>' +
    '<span class="amt">' + amtStr + '</span>' + (tog ? '<span class="chev">' + (open ? '▾' : '▸') + '</span>' : '<span class="chev" style="opacity:.5">' + (catId ? '✎' : '') + '</span>') + '</div>';

  // Each category is a leaf, tappable to edit (rename / seasonal / one-time).
  const catNode = (cid, lvl) => { const cl = catLabel(cid);
    return trow(cl.icon, cl.name, catRecurLabel(catData[cid]), fmt$(catData[cid].annualizedMonthly) + '/mo', lvl, null, false, cid); };

  // Month-by-month expected recurring spend for budgeting. Seasonal categories land
  // only in the months they actually occur; year-round ones spread evenly, so the
  // variation you see across months IS the seasonal load. Sums to 12× the annualized
  // total, so the headline and the breakdown always agree.
  const mbm = {};
  for (let cm = 1; cm <= 12; cm++) mbm[cm] = 0;
  for (const cid of catIds){ const info = catData[cid];
    if (info.trulySeasonal){ for (let cm = 1; cm <= 12; cm++) if (info.calAmt[cm]) mbm[cm] += info.calAmt[cm]; }
    else for (let cm = 1; cm <= 12; cm++) mbm[cm] += info.annualizedMonthly;
  }
  const mbmMax = Math.max.apply(null, Object.keys(mbm).map((k) => mbm[k]).concat([1]));
  const nowCm = new Date().getMonth() + 1;
  const mbmOpen = RECUR_OPEN.has('mbm');

  let html = '<div class="card">' +
    '<div class="tree-row grp" data-rtog="mbm" style="cursor:pointer"><span class="ic">📅</span>' +
    '<div class="body"><div class="t1">Annualized average recurring</div>' +
    '<div class="t2">every ongoing category, averaged per month · tap for month-by-month</div></div>' +
    '<span class="amt">' + fmt$(grandTotal) + '/mo</span><span class="chev">' + (mbmOpen ? '▾' : '▸') + '</span></div>';
  if (mbmOpen){
    html += '<div style="padding:6px 12px 12px">';
    for (let cm = 1; cm <= 12; cm++){
      const v = Math.round(mbm[cm]), w = Math.max(v > 0 ? 3 : 0, Math.round(100 * mbm[cm] / mbmMax)), cur = cm === nowCm;
      html += '<div style="display:flex;align-items:center;gap:9px;margin:6px 0">' +
        '<span style="width:30px;font-size:12px;font-weight:' + (cur ? '700' : '400') + ';color:' + (cur ? 'var(--accent)' : 'var(--dim)') + '">' + RECUR_MONTHS[cm] + '</span>' +
        '<div style="flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden"><div style="height:100%;width:' + w + '%;background:' + (cur ? 'var(--accent)' : 'var(--viz-1)') + ';border-radius:4px"></div></div>' +
        '<span style="width:66px;text-align:right;font-size:12px;font-variant-numeric:tabular-nums;color:var(--text)">' + fmt$(v) + '</span></div>';
    }
    html += '<p class="tiny" style="margin:6px 0 0">Expected recurring spend per calendar month — use these to set each month’s budget. The $/mo above is the yearly total averaged over 12.</p></div>';
  }
  html += '</div>';

  html += '<p class="tiny" style="margin:0 0 8px">Every category that isn’t one-time and has any history. Tap a group to expand; tap a category (✎) to rename it, mark it <b>seasonal</b>, or flag it one-time to remove it from here.</p>' +
    '<div class="card">';
  for (const g of GROUPS){
    if (g.kind === 'income' || g.kind === 'system') continue;
    const gcats = catIds.filter((cid) => DATA.cats[cid] && DATA.cats[cid].group === g.id);
    if (!gcats.length) continue;
    const gTotal = gcats.reduce((s, cid) => s + catTotal(cid), 0);
    const gkey = 'g:' + g.id, gOpen = RECUR_OPEN.has(gkey);
    html += '<div class="tree-row grp" data-rtog="' + esc(gkey) + '" style="cursor:pointer"><span class="ic">' + (g.icon || '📂') + '</span>' +
      '<div class="body"><div class="t1">' + esc(g.name) + '</div></div><span class="amt">' + fmt$(gTotal) + '/mo</span><span class="chev">' + (gOpen ? '▾' : '▸') + '</span></div>';
    if (!gOpen) continue;
    const direct = gcats.filter((cid) => !DATA.cats[cid].sub);
    const bySub = {};
    for (const cid of gcats){ const s = DATA.cats[cid].sub; if (s) (bySub[s] = bySub[s] || []).push(cid); }
    const items = direct.map((cid) => ({ type: 'cat', cid, amt: catTotal(cid) }))
      .concat(Object.keys(bySub).map((s) => ({ type: 'sub', s, cids: bySub[s], amt: bySub[s].reduce((x, cid) => x + catTotal(cid), 0) })))
      .sort((a, b) => b.amt - a.amt);
    for (const it of items){
      if (it.type === 'cat') html += catNode(it.cid, 'tree-l1');
      else {
        const skey = 'sub:' + g.id + '|' + it.s, sOpen = RECUR_OPEN.has(skey);
        html += trow(subIcon(g.id, it.s), it.s, it.cids.length + ' categor' + (it.cids.length === 1 ? 'y' : 'ies'), fmt$(it.amt) + '/mo', 'tree-l1', skey, sOpen);
        if (sOpen) for (const cid of it.cids.slice().sort((a, b) => catTotal(b) - catTotal(a))) html += catNode(cid, 'tree-l2');
      }
    }
  }
  html += '</div>';

  if (transfers.length){
    const tt = transfers.reduce((s, r) => s + r.annualizedMonthly, 0);
    html += '<div class="card"><h3>Recurring transfers · ' + fmt$(tt) + '/mo</h3>' +
      '<p class="tiny" style="margin:0 0 6px">Card payments &amp; the like — repeat monthly but aren’t spending. Not in the total above.</p>' +
      transfers.map((r) => '<div class="list-item" style="cursor:default"><span class="ic">' + catLabel(r.cat).icon + '</span>' +
        '<div class="body"><div class="t1">' + esc(r.label) + '</div><div class="t2">' + recurCadenceLabel(r) + '</div></div>' +
        '<span class="amt">' + fmt$(r.annualizedMonthly) + '/mo</span></div>').join('') + '</div>';
  }

  c.innerHTML = html;
  c.querySelectorAll('[data-rtog]').forEach((row) => {
    row.onclick = () => { const k = row.dataset.rtog; if (RECUR_OPEN.has(k)) RECUR_OPEN.delete(k); else RECUR_OPEN.add(k); renderRecurringScreen(c); };
  });
  c.querySelectorAll('[data-catedit]').forEach((row) => {
    row.onclick = () => openCatEditor(row.dataset.catedit, () => renderRecurringScreen(c));
  });
}

/* ---- Categories & Rules screen ---- */
// How many live transactions reference a category (as cat or in any split part).
function countCatTxns(catId){
  let n = 0;
  for (const id in DATA.txns){
    const t = DATA.txns[id];
    if (t.deleted) continue;
    if (t.cat === catId || (t.splits && t.splits.some((p) => p.cat === catId))) n++;
  }
  return n;
}
// Move every transaction, split part, rule and budget from source -> target,
// then archive the source. The target's type/settings win.
function doMergeCategory(sourceId, targetId){
  if (sourceId === targetId) return 0;
  let n = 0;
  for (const id in DATA.txns){
    const t = DATA.txns[id];
    if (t.deleted) continue;
    let changed = false;
    if (t.cat === sourceId){ t.cat = targetId; changed = true; }
    if (t.splits && t.splits.length){
      t.splits = t.splits.map((p) => { if (p.cat === sourceId){ changed = true; return { cat: targetId, amt: p.amt, note: p.note }; } return p; });
    }
    if (changed){ put('txns', t); n++; }
  }
  for (const id in DATA.rules){
    const r = DATA.rules[id];
    if (!r.deleted && r.cat === sourceId){ r.cat = targetId; put('rules', r); }
  }
  const sb = DATA.budgets[sourceId];
  if (sb && !sb.deleted && sb.amt > 0){
    const tb = DATA.budgets[targetId];
    if (!tb || tb.deleted || !tb.amt) put('budgets', { id: targetId, amt: sb.amt });
    softDelete('budgets', sourceId);
  }
  softDelete('cats', sourceId);
  return n;
}
// Picker that disambiguates same-named categories by group + type.
function openMergePicker(sourceId, after){
  const src = DATA.cats[sourceId];
  if (!src) return;
  const kindLbl = (c) => { const k = c.kind || 'expense'; return k === 'expense' ? 'expense' : k; };
  const targets = liveCats().filter((c) => c.id !== sourceId);
  let html = '<p class="muted" style="margin:0 0 10px">Move all <b>' + countCatTxns(sourceId) + '</b> transactions from ' +
    '<b>' + esc(src.icon || '') + ' ' + esc(src.name) + '</b> into which category? This one is then archived.</p>';
  for (const g of GROUPS){
    const cats = targets.filter((c) => c.group === g.id);
    if (!cats.length) continue;
    html += '<div class="group-label">' + esc(g.name) + '</div>' +
      cats.map((c) => '<div class="list-item" data-tgt="' + esc(c.id) + '"><span class="ic">' + esc(c.icon || '•') + '</span>' +
        '<div class="body"><div class="t1">' + esc(c.name) + '</div><div class="t2">' + esc(kindLbl(c)) +
        (catExcludedFromEstimates(c) ? ' · one-time' : '') + '</div></div><span class="menu-chev">›</span></div>').join('');
  }
  const m = modal('Merge “' + src.name + '” into…', html);
  m.node.querySelectorAll('[data-tgt]').forEach((n2) => {
    n2.onclick = async () => {
      const tgt = DATA.cats[n2.dataset.tgt];
      if (!tgt) return;
      if (!(await confirmDlg('Move all transactions from “' + src.name + '” into “' + tgt.name + '” (' + (tgt.kind || 'expense') + '), then archive “' + src.name + '”?', 'Merge'))) return;
      const moved = doMergeCategory(sourceId, tgt.id);
      m.close(); renderCurrent();
      if (after) after();
      toast('Merged ' + moved + ' transaction' + (moved === 1 ? '' : 's') + ' into ' + tgt.name);
    };
  });
}
