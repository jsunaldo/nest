        '<button data-pf="in" class="' + (v === 'in' ? 'on' : '') + '">Always</button>' +
        '<button data-pf="out" class="' + (v === 'out' ? 'on' : '') + '">Never</button></div>' +
        '<span class="tiny">Auto follows the category. Set “Never” for one-time things (seed money, gifts, a wedding cost) so they don’t skew next month’s forecast.</span></label>';
    })() +
    '<button class="btn btn-danger btn-block" data-x="del">Delete transaction</button>';
  const m = modal('Transaction', html);
  const q = (s) => m.node.querySelector(s);
  q('[data-x=cat]').onclick = async () => {
    const cat = await openCatPicker({ merchant: t.m, showSystem: true });
    if (!cat) return;
    if (t.splits && t.splits.length){
      if (!(await confirmDlg('Replace the existing split with one category?', 'Replace'))) return;
      t.splits = null;
    }
    t.cat = cat;
    if (t.status === 'review') t.status = 'ok';
    put('txns', t);
    if (q('[data-x=always]') && q('[data-x=always]').checked){
      createRule(t.m, cat);
      const n = reapplyRules();
      if (n) toast('+' + n + ' more auto-categorized');
    }
    m.close(); renderCurrent(); toast('Categorized');
  };
  q('[data-x=flip]').onclick = async () => {
    if (!(await confirmDlg('Flip this from money ' + (t.amt > 0 ? 'IN to money OUT' : 'OUT to money IN') +
      '? Use this only when the bank imported the amount in the wrong direction.', 'Flip'))) return;
    t.amt = -t.amt;
    if (t.splits) t.splits = t.splits.map((p) => ({ cat: p.cat, amt: -p.amt, note: p.note }));
    put('txns', t); m.close(); renderCurrent(); toast('Direction flipped');
  };
  q('[data-x=split]').onclick = () => { m.close(); openSplitEditor(t); };
  q('[data-x=transfer]').onclick = () => {
    t.cat = 'sys-transfer'; t.splits = null;
    if (t.status === 'review') t.status = 'ok';
    put('txns', t); m.close(); renderCurrent(); toast('Marked as transfer');
  };
  q('[data-x=excl]').onclick = () => {
    t.status = t.status === 'excluded' ? ((t.cat || (t.splits && t.splits.length)) ? 'ok' : 'review') : 'excluded';
    put('txns', t); m.close(); renderCurrent();
  };
  q('[data-x=note]').onchange = (e) => { t.note = e.target.value; put('txns', t); };
  q('[data-x=date]').onchange = (e) => { const d = parseDateISO(e.target.value); if (d){ t.date = d; put('txns', t); } };
  q('[data-x=acct]').onchange = (e) => { t.acct = e.target.value; put('txns', t); };
  m.node.querySelectorAll('[data-pf]').forEach((b) => {
    b.onclick = () => {
      t.projFuture = b.dataset.pf === 'in' ? true : b.dataset.pf === 'out' ? false : null;
      put('txns', t);
      m.node.querySelectorAll('[data-pf]').forEach((x) => x.classList.toggle('on', x === b));
      const eff = txnProjects(t, t.cat || (t.splits && t.splits[0] && t.splits[0].cat) || '__uncat');
      const hint = m.node.querySelector('[data-x=projseg]').previousElementSibling;
      if (hint) hint.innerHTML = 'Count in future estimates? <span class="tiny">(now: ' + (eff ? 'included' : 'excluded') + ')</span>';
      renderCurrent();
    };
  });
  q('[data-x=del]').onclick = async () => {
    if (!(await confirmDlg('Delete this transaction? Re-importing the same statement will NOT bring it back.', 'Delete'))) return;
    softDelete('txns', t.id); m.close(); renderCurrent(); toast('Deleted');
  };
}

/* ---- split editor ---- */
function openSplitEditor(t){
  const sign = t.amt < 0 ? -1 : 1;
  const totalAbs = Math.abs(t.amt);
  const parts = (t.splits && t.splits.length)
    ? t.splits.map((p) => ({ cat: p.cat, cents: Math.abs(p.amt) }))
    : [{ cat: t.cat, cents: totalAbs }, { cat: null, cents: 0 }];
  const m = modal('Split ' + fmt$(t.amt),
    '<div class="muted" style="margin-bottom:10px">' + esc(t.m) + ' · ' + fmtDate(t.date) + '</div>' +
    '<div data-x="rows"></div>' +
    '<button class="btn btn-sm" data-x="add">＋ Add part</button>' +
    '<div class="row" style="margin-top:14px"><div class="grow muted" data-x="rem"></div>' +
    '<button class="btn btn-primary" data-x="save">Save split</button></div>');
  const rowsC = m.node.querySelector('[data-x=rows]');
  const sumCents = () => parts.reduce((s, p) => s + (p.cents || 0), 0);
  function footer(){
    const rem = totalAbs - sumCents();
    m.node.querySelector('[data-x=rem]').textContent =
      rem === 0 ? 'Balanced ✓' : rem > 0 ? fmt$(rem) + ' left to assign' : fmt$(-rem) + ' over';
    m.node.querySelector('[data-x=save]').disabled = !(rem === 0 && parts.every((p) => p.cat && p.cents > 0));
  }
  function draw(){
    rowsC.innerHTML = parts.map((p, i) => {
      const cl = catLabel(p.cat);
      return '<div class="row split-row" data-i="' + i + '">' +
        '<button class="btn btn-sm grow" data-x="pcat" style="text-align:left">' + cl.icon + ' ' + esc(cl.name) + '</button>' +
        '<input type="number" step="0.01" min="0" inputmode="decimal" data-x="pamt" style="max-width:104px" value="' +
        (p.cents ? (p.cents / 100).toFixed(2) : '') + '">' +
        '<button class="btn btn-sm" data-x="prem" title="Assign remainder">↧</button>' +
        '<button class="btn btn-sm" data-x="pdel">×</button></div>';
    }).join('');
    rowsC.querySelectorAll('.split-row').forEach((rowEl) => {
      const i = +rowEl.dataset.i, p = parts[i];
      rowEl.querySelector('[data-x=pcat]').onclick = async () => {
        const cat = await openCatPicker({ merchant: t.m, showSystem: true });
        if (cat){ p.cat = cat; draw(); }
      };
      rowEl.querySelector('[data-x=pamt]').oninput = (e) => {
        p.cents = Math.max(0, Math.round((parseFloat(e.target.value) || 0) * 100));
        footer();
      };
      rowEl.querySelector('[data-x=prem]').onclick = () => { p.cents = Math.max(0, p.cents + (totalAbs - sumCents())); draw(); };
      rowEl.querySelector('[data-x=pdel]').onclick = () => { if (parts.length > 1){ parts.splice(i, 1); draw(); } };
    });
    footer();
  }
  m.node.querySelector('[data-x=add]').onclick = () => { parts.push({ cat: null, cents: Math.max(0, totalAbs - sumCents()) }); draw(); };
  m.node.querySelector('[data-x=save]').onclick = () => {
    t.splits = parts.map((p) => ({ cat: p.cat, amt: sign * p.cents }));
    t.cat = null;
    if (t.status === 'review') t.status = 'ok';
    put('txns', t); m.close(); renderCurrent(); toast('Split saved');
  };
  draw();
}

/* ---- import flow ---- */
async function runImportFlow(fileList){
  const files = Array.from(fileList || []);
  if (!files.length) return;
  for (const f of files){
    let text;
    try { text = await f.text(); } catch (e) { toast('Could not read ' + f.name); continue; }
    const a = analyzeCSV(text, f.name);
    if (a.error){ toast(f.name + ': ' + a.error); continue; }
    await importOneFile(a);
  }
  renderCurrent();
}
function importPrefs(){ return DATA.kv.importPrefs || { id: 'importPrefs', sigs: {} }; }
function importOneFile(a){
  return new Promise((resolve) => {
    const sigKey = a.headers.join('|');
    let acctId = importPrefs().sigs[sigKey];
    if (!acctId || !DATA.accounts[acctId] || DATA.accounts[acctId].deleted) acctId = LAST_IMPORT_ACCT;
    if ((!acctId || !DATA.accounts[acctId]) && liveAccounts().length === 1) acctId = liveAccounts()[0].id;
    const mapping = Object.assign({}, a.mapping);
    let mode = (mapping.debitIdx != null && mapping.debitIdx >= 0) ? 'dc' : 'single';
    let customOpen = !a.preset;
    const m = modal('Import: ' + a.filename, '<div data-x="body"></div>', () => resolve());
    const body = m.node.querySelector('[data-x=body]');

    const colSelect = (x, idx) =>
      '<select data-x="' + x + '"><option value="-1">—</option>' +
      a.headers.map((h, i) => '<option value="' + i + '"' + (i === idx ? ' selected' : '') + '>' + esc(h) + '</option>').join('') +
      '</select>';

    function draw(){
      const res = applyMapping(a.dataRows, mapping);
      const out = res.parsed.filter((p) => p.amt < 0).length;
      const inn = res.parsed.length - out;
      let html =
        '<label class="fld"><span>Account</span><select data-x="acct"><option value="">Choose…</option>' +
        acctOptions(acctId) + '<option value="__new">＋ New account…</option></select></label>' +
        '<div data-x="newacct" style="display:none;margin-bottom:10px"><div class="row">' +
        '<input type="text" data-x="nname" placeholder="Account name" class="grow">' +
        '<select data-x="ntype" style="max-width:130px"><option value="credit">Credit card</option>' +
        '<option value="checking">Checking</option><option value="savings">Savings</option></select>' +
        '<button class="btn btn-sm" data-x="nadd">Add</button></div></div>' +
        '<div style="margin-bottom:10px"><span class="chip' + (customOpen ? '' : ' on') + '" data-x="preset">' +
        (a.preset ? esc(a.preset.label) + ' · tap to adjust' : 'Custom mapping') + '</span></div>';
      if (customOpen){
        html += '<div class="card" style="background:var(--card2)">' +
          '<div class="row" style="margin-bottom:8px">' +
          '<label class="fld grow"><span>Date column</span>' + colSelect('cdate', mapping.dateIdx) + '</label>' +
          '<label class="fld grow"><span>Description</span>' + colSelect('cdesc', mapping.descIdx) + '</label></div>' +
          '<div class="seg" style="margin-bottom:8px">' +
          '<button data-x="m1" class="' + (mode === 'single' ? 'on' : '') + '">One amount column</button>' +
          '<button data-x="m2" class="' + (mode === 'dc' ? 'on' : '') + '">Debit + credit</button></div>' +
          (mode === 'single'
            ? '<label class="fld"><span>Amount column</span>' + colSelect('camt', mapping.amountIdx) + '</label>'
            : '<div class="row"><label class="fld grow"><span>Debit (money out)</span>' + colSelect('cdeb', mapping.debitIdx) + '</label>' +
              '<label class="fld grow"><span>Credit (money in)</span>' + colSelect('ccre', mapping.creditIdx) + '</label></div>') +
          '</div>';
      }
      const prevRows = res.parsed.slice(0, 5).map((p) =>
        '<tr><td>' + p.date + '</td><td>' + esc(p.desc) + '</td><td style="text-align:right">' + fmt$(p.amt) + '</td></tr>').join('');
      html += '<div class="tbl-wrap"><table class="map-tbl"><tr><th>Date</th><th>Description</th><th style="text-align:right">Amount</th></tr>' +
        (prevRows || '<tr><td colspan="3" class="muted">Nothing parseable with this mapping</td></tr>') + '</table></div>' +
        '<div class="muted" style="margin:8px 0">' + res.parsed.length + ' rows · ' + out + ' money out · ' + inn + ' money in' +
        (res.skipped ? ' · ' + res.skipped + ' unparseable skipped' : '') + '</div>' +
        '<label class="row" style="margin-bottom:10px"><input type="checkbox" data-x="flip" style="width:auto"' +
        (mapping.flip ? ' checked' : '') + '> <span class="muted">Flip signs (purchases are showing as money in)</span></label>' +
        '<button class="btn btn-primary btn-block" data-x="go"' + ((acctId && res.parsed.length) ? '' : ' disabled') + '>Import ' +
        res.parsed.length + ' transactions</button>';
      body.innerHTML = html;
      bind(res);
    }
    function bind(res){
      const q = (s) => body.querySelector(s);
      q('[data-x=acct]').onchange = (e) => {
        if (e.target.value === '__new') q('[data-x=newacct]').style.display = 'block';
        else { acctId = e.target.value || null; draw(); }
      };
      if (q('[data-x=nadd]')) q('[data-x=nadd]').onclick = () => {
        const name = q('[data-x=nname]').value.trim();
        if (!name) return;
        const acc = put('accounts', { id: uid(), name, type: q('[data-x=ntype]').value });
        acctId = acc.id; draw();
      };
      q('[data-x=preset]').onclick = () => { customOpen = !customOpen; draw(); };
      q('[data-x=flip]').onchange = (e) => { mapping.flip = e.target.checked; draw(); };
      const colBind = (x, key) => { const n2 = q('[data-x=' + x + ']'); if (n2) n2.onchange = (e) => { mapping[key] = +e.target.value; draw(); }; };
      colBind('cdate', 'dateIdx'); colBind('cdesc', 'descIdx'); colBind('camt', 'amountIdx');
      colBind('cdeb', 'debitIdx'); colBind('ccre', 'creditIdx');
      const seg = (x, fn) => { const n2 = q('[data-x=' + x + ']'); if (n2) n2.onclick = fn; };
      seg('m1', () => { mode = 'single'; mapping.debitIdx = null; mapping.creditIdx = null; if (mapping.amountIdx == null) mapping.amountIdx = -1; draw(); });
      seg('m2', () => { mode = 'dc'; mapping.amountIdx = null; if (mapping.debitIdx == null) mapping.debitIdx = -1; if (mapping.creditIdx == null) mapping.creditIdx = -1; draw(); });
      q('[data-x=go]').onclick = () => {
        const r = importParsed(acctId, res.parsed, a.filename);
        const prefs = importPrefs(); prefs.sigs[sigKey] = acctId; put('kv', prefs);
        LAST_IMPORT_ACCT = acctId;
        body.innerHTML = '<div class="card" style="background:var(--card2)"><h3>Imported</h3>' +
          '<p style="margin:0 0 6px">Added <b>' + r.added + '</b> · skipped <b>' + r.dupes + '</b> duplicate' + (r.dupes === 1 ? '' : 's') + '</p>' +
          (r.from ? '<p class="muted" style="margin:0 0 6px">' + fmtDate(r.from) + ' → ' + fmtDate(r.to) + '</p>' : '') +
          '<p style="margin:0">' + (r.review ? '<b>' + r.review + '</b> need review' : 'Everything auto-categorized 🎉') + '</p></div>' +
          '<div class="row">' + (r.review ? '<button class="btn grow" data-x="rev">Review now</button>' : '') +
          '<button class="btn btn-primary grow" data-x="done">Done</button></div>';
        const rv = body.querySelector('[data-x=rev]');
        if (rv) rv.onclick = () => { m.close(); showTab('review'); };
        body.querySelector('[data-x=done]').onclick = () => m.close();
      };
    }
    draw();
  });
}

/* ---- §Home (yearly overview — the financial-advisor view) ---- */
function renderHome(){
  const c = $('#view-home');
  const all = liveTxns();
  if (!all.length){
    c.innerHTML =
      '<div class="card"><h3>Welcome to Nest 🪺</h3>' +
      '<p style="margin:0 0 8px">Every dollar you two spend — one place, both phones.</p>' +
      '<p class="muted" style="margin:0 0 4px">1. Import bank / card CSV statements below</p>' +
      '<p class="muted" style="margin:0 0 4px">2. Sort the few it can’t auto-categorize (Review tab)</p>' +
      '<p class="muted" style="margin:0">3. Set your baseline in More → Budgets, turn on Sync to share</p></div>' +
      '<button class="btn btn-primary btn-block" data-x="import">📥 Import statements</button>';
    c.querySelector('[data-x=import]').onclick = () => openScreen('Import', renderImportScreen);
    return;
  }
  const agg = buildMonthAgg();
  const years = Array.from(new Set(Object.keys(agg).map((ym) => ym.slice(0, 4)))).sort();
  const curYear = currentYM().slice(0, 4);
  if (!UI.year || !years.includes(UI.year)) UI.year = years.includes(curYear) ? curYear : years[years.length - 1];
  const yi = years.indexOf(UI.year);
  const st = yearStats(agg, UI.year);
  const baseline = baselineByCat(agg);
  const rq = reviewTxns();
  const rqOut = rq.reduce((s, t) => s + (t.amt < 0 ? -t.amt : 0), 0);
  const rqIn = rq.reduce((s, t) => s + (t.amt > 0 ? t.amt : 0), 0);

  let html = '<div class="month-nav"><button data-x="prev"' + (yi <= 0 ? ' disabled' : '') + '>‹</button><b>' + esc(UI.year) + '</b>' +
    '<button data-x="next"' + (yi >= years.length - 1 ? ' disabled' : '') + '>›</button></div>';

  html += '<div class="stat-grid" style="margin-bottom:12px">' +
    '<div class="stat"><div class="v amt-pos">' + fmt$(st.income) + '</div><div class="l">Income ' + esc(UI.year) + '</div></div>' +
    '<div class="stat"><div class="v">' + fmt$(st.spend) + '</div><div class="l">Spent ' + esc(UI.year) + '</div></div></div>';

  const rate = st.income > 0 ? Math.round(100 * st.net / st.income) : null;
  html += '<div class="card"><h3>The bottom line</h3>' +
    '<p style="margin:0 0 6px">Net so far: <b style="color:' + (st.net >= 0 ? 'var(--status-good)' : 'var(--status-crit)') + '">' + fmt$(st.net, { signed: true }) + '</b>' +
    (rate !== null ? ' <span class="muted">(' + (st.net >= 0 ? 'saving ' + rate + '% of income' : 'spending above income') + ')</span>' : '') + '</p>' +
    (st.proj
      ? '<p style="margin:0 0 6px">At your recent pace — ' + fmt$(st.proj.rateSpend) + '/mo out, ' + fmt$(st.proj.rateIncome) + '/mo in — you’ll end ' + esc(UI.year) + ' around ' +
        '<b style="color:' + (st.proj.net >= 0 ? 'var(--status-good)' : 'var(--status-crit)') + '">' + fmt$(st.proj.net, { signed: true }) + '</b>' +
        (st.proj.net >= 0 ? ' — on pace to come out ahead.' : ' — on pace to go under; “Where to cut” below.') + '</p>' +
        '<p class="tiny" style="margin:0 0 6px">Pace = what recurs: everyday spending (dining, gifts you give) and paychecks. One-time things — seed money, gifts received, wedding &amp; house costs — count for what already happened but don’t project. Change any item’s setting in its editor (“Count in future estimates?”).</p>'
      : '') +
    (() => {
      const negs = st.months.filter((ym) => agg[ym].spendTotal < 0);
      return negs.length
        ? '<p style="margin:0 0 6px;color:var(--status-crit)">⚠️ ' + negs.map(fmtMonth).join(', ') +
          (negs.length > 1 ? ' show' : ' shows') + ' <b>negative total spending</b> — a money-in transaction is sitting in a spending category (or an expense imported backwards). Every number here is off until it’s fixed. More → Data health lists the culprits.</p>'
        : '';
    })() +
    (st.invest > 0 ? '<p class="muted" style="margin:0 0 6px">📈 Plus ' + fmt$(st.invest) + ' invested — kept separate from spending.</p>' : '') +
    (st.oneTime > 0 ? '<p class="muted" style="margin:0">🏠 One-time house / big-event spending: ' + fmt$(st.oneTime) + ' — excluded from your baseline.</p>' : '') +
    '</div>';

  if (rq.length){
    html += '<div class="card banner-review" data-x="rev"><div class="row"><span style="font-size:20px">🧾</span>' +
      '<div class="grow"><b>' + rq.length + '</b> transaction' + (rq.length > 1 ? 's' : '') + ' need review' +
      '<div class="tiny">' + fmt$(rqOut) + ' out · ' + fmt$(rqIn) + ' in — unsorted money sits OUT of every number above until you sort it</div></div><span class="menu-chev">›</span></div></div>';
  }

  if (st.months.length){
    let chartSel = TRENDS_SEL.month;
    if (!chartSel || !st.months.includes(chartSel)) chartSel = st.months[st.months.length - 1];
    TRENDS_SEL.month = chartSel;
    html += yearChartsHTML(agg, st.months, chartSel, baseline);
  }

  const cuts = cutSuggestions(agg, UI.year);
  if (cuts.length){
    html += '<div class="card"><h3>Where to cut</h3><p class="tiny" style="margin:0 0 6px">Most over their expected pace in ' + esc(UI.year) + ' (full months only)</p>' +
      cuts.map((x) => '<div class="list-item" data-cat="' + esc(x.cat.id) + '"><span class="ic">' + esc(x.cat.icon || '•') + '</span>' +
        '<div class="body"><div class="t1">' + esc(x.cat.name) + '</div><div class="t2">' + fmt$(x.ytd) + ' spent vs ' + fmt$(x.expected) + ' expected</div></div>' +
        '<span class="amt" style="color:var(--status-crit)">+' + fmt$(x.over) + '</span></div>').join('') + '</div>';
  } else if (st.fullMonths.length){
    html += '<div class="card"><h3>Where to cut</h3><p class="muted" style="margin:0">Nothing is over its expected pace' +
      (baseline ? '' : ' — set budgets or a baseline to sharpen this') + '. 👏</p></div>';
  }

  // "/mo avg" uses FULL months only — the current partial month must not drag
  // a steady bill (mortgage) below its true monthly cost.
  const fullN = st.fullMonths.length;
  const catRows = Object.keys(st.byCat).map((cid) => ({
    cid, total: st.byCat[cid],
    fullTotal: st.fullMonths.reduce((s, ym) => s + (agg[ym].spend[cid] || 0), 0),
  })).filter((x) => x.total > 0).sort((a, b) => b.total - a.total).slice(0, 8);
  if (catRows.length){
    html += '<div class="card"><h3>' + esc(UI.year) + ' by category</h3>' + catRows.map((x) => {
      const cl = catLabel(x.cid);
      const avgTxt = fullN ? fmt$(Math.round(x.fullTotal / fullN)) + '/mo avg over ' + fullN + ' full month' + (fullN > 1 ? 's' : '') : 'partial month only';
      return '<div class="list-item" data-cat="' + esc(x.cid) + '"><span class="ic">' + cl.icon + '</span>' +
        '<div class="body"><div class="t1">' + esc(cl.name) + '</div><div class="t2">' + avgTxt + '</div></div>' +
        '<span class="amt">' + fmt$(x.total) + '</span></div>';
    }).join('') + '</div>';
  }

  html += '<div class="card"><h3>Month by month</h3>' + st.perMonth.slice().reverse().map((m) =>
    '<div class="list-item" data-ym="' + m.ym + '"><div class="body"><div class="t1">' + fmtMonth(m.ym) + '</div>' +
    '<div class="t2">out ' + fmt$(m.spend) + ' · in ' + fmt$(m.income) + '</div></div>' +
    '<span class="amt" style="color:' + (m.net >= 0 ? 'var(--status-good)' : 'var(--status-crit)') + '">' + fmt$(m.net, { signed: true }) + '</span>' +
    '<span class="menu-chev">›</span></div>').join('') +
    '<p class="tiny" style="margin:8px 0 0">Tap a month for its full breakdown — budgets, categories, gifts, alcohol, groceries…</p></div>';

  const rec = detectRecurring();
  if (rec.length){
    const rt = rec.reduce((s, r) => s + r.monthly, 0);
    html += '<div class="card" data-x="recur" style="cursor:pointer"><div class="row"><span style="font-size:18px">🔁</span>' +
      '<div class="grow muted">Recurring load: <b style="color:var(--text)">' + fmt$(rt) + '/mo</b> across ' + rec.length + ' repeat bills</div>' +
      '<span class="menu-chev">›</span></div></div>';
  }
  html += '<button class="btn btn-primary btn-block" data-x="import" style="margin-bottom:16px">📥 Import statements</button>';
  c.innerHTML = html;

  c.querySelector('[data-x=prev]').onclick = () => { UI.year = years[yi - 1]; renderHome(); };
  c.querySelector('[data-x=next]').onclick = () => { UI.year = years[yi + 1]; renderHome(); };
  const on = (sel, fn) => { const n2 = c.querySelector(sel); if (n2) n2.onclick = fn; };
  on('[data-x=rev]', () => showTab('review'));
  on('[data-x=recur]', () => openScreen('Recurring', renderRecurringScreen));
  on('[data-x=import]', () => openScreen('Import', renderImportScreen));
  c.querySelectorAll('[data-cat]').forEach((n2) => {
    n2.onclick = () => {
      if (n2.dataset.cat === '__uncat'){ showTab('review'); return; }
      ACT.cat = n2.dataset.cat; ACT.month = null; showTab('activity');
    };
  });
  c.querySelectorAll('[data-ym]').forEach((n2) => {
    n2.onclick = () => { UI.month = n2.dataset.ym; openScreen('Monthly detail', renderMonthScreen); };
  });
  c.querySelectorAll('[data-m]').forEach((r2) => {
    r2.onclick = () => { TRENDS_SEL.month = r2.dataset.m; renderHome(); };
  });
}

/* ---- Monthly detail (drill-down from the yearly Home) ---- */
function renderMonthScreen(c){
  const agg = buildMonthAgg();
  if (!UI.month) UI.month = currentYM();
  const mAgg = agg[UI.month] || { spend: {}, spendTotal: 0, incomeTotal: 0, investTotal: 0 };
  const baseline = baselineByCat(agg);
  let totalBudget = 0, anyBudget = false;
  for (const cat of liveCats()){
    if ((cat.kind || 'expense') !== 'expense') continue;
    const b = budgetFor(cat.id, baseline);
    if (b){ totalBudget += b.amt; anyBudget = true; }
  }
  const left = totalBudget - mAgg.spendTotal;
  let html = '<div class="month-nav"><button data-x="prev">‹</button><b>' + fmtMonth(UI.month) + '</b>' +
    '<button data-x="next"' + (UI.month >= currentYM() ? ' disabled' : '') + '>›</button></div>';
  html += '<div class="stat-grid" style="margin-bottom:12px">' +
    '<div class="stat"><div class="v">' + fmt$(mAgg.spendTotal) + '</div><div class="l">Spent</div>' +
    '<div class="tiny">Income ' + fmt$(mAgg.incomeTotal) + '</div></div>' +
    (anyBudget
      ? '<div class="stat"><div class="v"' + (left < 0 ? ' style="color:var(--status-crit)"' : '') + '>' + fmt$(left) + '</div>' +
        '<div class="l">Budget left</div><div class="tiny">of ' + fmt$(totalBudget) + '</div></div>'
      : '<div class="stat" data-x="setb" style="cursor:pointer"><div class="v">→</div><div class="l">Set budgets</div>' +
        '<div class="tiny">Baseline & budgets</div></div>') + '</div>';
  const rows = [];
  for (const cat of liveCats()){
    if ((cat.kind || 'expense') !== 'expense') continue;
    const spent = mAgg.spend[cat.id] || 0;
    const b = budgetFor(cat.id, baseline);
    if (spent === 0 && !b) continue; // negative rows (refund-heavy months) stay visible
    rows.push({ cat, spent, b });
  }
  rows.sort((x, y) => y.spent - x.spent);
  if (rows.length){
    html += '<div class="card"><h3>' + fmtMonth(UI.month) + ' by category</h3>';
    for (const r of rows){
      let bar;
      if (r.b){
        const pct = r.b.amt > 0 ? r.spent / r.b.amt : 0;
        const cls = pct > 1.05 ? 'over' : pct >= 0.85 ? 'warn' : '';
        bar = '<div class="progress"><i class="' + cls + '" style="width:' + Math.min(100, Math.round(pct * 100)) + '%"></i></div>';
      } else bar = '<div class="progress"><i style="width:0"></i></div>';
      html += '<div class="list-item" data-cat="' + esc(r.cat.id) + '"><span class="ic">' + esc(r.cat.icon || '•') + '</span>' +
        '<div class="body"><div class="t1">' + esc(r.cat.name) + '</div>' + bar + '</div>' +
        '<span class="amt">' + fmt$(r.spent) + (r.b ? '<span class="tiny"> / ' + fmt$(r.b.amt) + '</span>' : '') + '</span></div>';
    }
    if (mAgg.spend.__uncat > 0){
      html += '<div class="list-item" data-x="unc"><span class="ic">❓</span><div class="body"><div class="t1">Uncategorized</div>' +
        '<div class="t2">Tap to review</div></div><span class="amt">' + fmt$(mAgg.spend.__uncat) + '</span></div>';
    }
    html += '<button class="btn btn-sm btn-block" data-x="allb" style="margin-top:8px">All budgets →</button></div>';
  } else {
    html += '<div class="empty">No activity in ' + fmtMonth(UI.month) + '.</div>';
  }
  if ((mAgg.investTotal || 0) > 0)
    html += '<div class="card"><div class="row"><span style="font-size:18px">📈</span>' +
      '<div class="grow muted">Invested this month: <b style="color:var(--text)">' + fmt$(mAgg.investTotal) + '</b></div></div></div>';
  html += monthVsBaselineHTML(agg, UI.month, baseline);
  html += '<button class="btn btn-block" data-x="alla" style="margin-bottom:16px">Open ' + fmtMonth(UI.month) + ' in Activity →</button>';
  c.innerHTML = html;

  c.querySelector('[data-x=prev]').onclick = () => { UI.month = shiftYM(UI.month, -1); renderMonthScreen(c); };
  c.querySelector('[data-x=next]').onclick = () => { UI.month = shiftYM(UI.month, 1); renderMonthScreen(c); };
  const on = (sel, fn) => { const n2 = c.querySelector(sel); if (n2) n2.onclick = fn; };
  on('[data-x=unc]', () => showTab('review'));
  on('[data-x=setb]', () => openScreen('Budgets & Baseline', renderBudgetsScreen));
  on('[data-x=allb]', () => openScreen('Budgets & Baseline', renderBudgetsScreen));
  on('[data-x=alla]', () => { ACT.month = UI.month; ACT.cat = null; showTab('activity'); });
  on('[data-x=gob]', () => openScreen('Budgets & Baseline', renderBudgetsScreen));
  c.querySelectorAll('.list-item[data-cat]').forEach((n2) => {
    n2.onclick = () => { ACT.cat = n2.dataset.cat; ACT.month = UI.month; showTab('activity'); };
  });
}
/* ---- §Review (two modes: auto-sort queue + manual verify pass) ---- */
function renderReview(){
  const c = $('#view-review');
  const nSort = reviewTxns().length;
  c.innerHTML =
    '<div class="seg" style="margin-bottom:12px">' +
    '<button data-x="msort" class="' + (REVIEW.mode === 'sort' ? 'on' : '') + '">Needs sorting' + (nSort ? ' · ' + nSort : '') + '</button>' +
    '<button data-x="mverify" class="' + (REVIEW.mode === 'verify' ? 'on' : '') + '">Verify all</button></div>' +
    '<div data-x="body"></div>';
  c.querySelector('[data-x=msort]').onclick = () => { REVIEW.mode = 'sort'; renderReview(); };
  c.querySelector('[data-x=mverify]').onclick = () => { REVIEW.mode = 'verify'; renderReview(); };
  const body = c.querySelector('[data-x=body]');
  if (REVIEW.mode === 'verify') return renderVerifyMode(body);
  renderSortMode(body);
}

// Manual verification: walk every non-excluded transaction in a chosen window,
// confirm each is correct. A t.verified timestamp tracks what's been validated.
function verifyPool(){
  return liveTxns().filter((t) => t.status !== 'excluded' &&
    (!REVIEW.month || ymOf(t.date) === REVIEW.month) &&
    (!REVIEW.acct || t.acct === REVIEW.acct));
}
function renderVerifyMode(c){
  const months = dataMonths();
  const accts = liveAccounts();
  const pool = verifyPool();
  const done = pool.filter((t) => t.verified).length;
  const queue = pool.filter((t) => !t.verified).sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));

  let head = '<div class="month-strip">' +
    '<span class="chip' + (!REVIEW.month ? ' on' : '') + '" data-mv="">All months</span>' +
    months.map((ym) => '<span class="chip' + (REVIEW.month === ym ? ' on' : '') + '" data-mv="' + ym + '">' + fmtMonth(ym) + '</span>').join('') +
    '</div>';
  if (accts.length > 1){
    head += '<div class="filter-row">' +
      '<span class="chip' + (!REVIEW.acct ? ' on' : '') + '" data-av="">All accounts</span>' +
      accts.map((a) => '<span class="chip' + (REVIEW.acct === a.id ? ' on' : '') + '" data-av="' + esc(a.id) + '">' + esc(a.name) + '</span>').join('') +
      '</div>';
  }
  const scope = (REVIEW.month ? fmtMonth(REVIEW.month) : 'all months') + (REVIEW.acct ? ' · ' + accountName(REVIEW.acct) : '');
  head += '<p class="muted" style="margin:0 0 10px">' + done + ' of ' + pool.length + ' verified in ' + scope +
    (done ? ' · <a data-x="reset" style="cursor:pointer">reset</a>' : '') + '</p>';

  function bind(){
    c.querySelectorAll('[data-mv]').forEach((ch) => { ch.onclick = () => { REVIEW.month = ch.dataset.mv || null; renderVerifyMode(c); }; });
    c.querySelectorAll('[data-av]').forEach((ch) => { ch.onclick = () => { REVIEW.acct = ch.dataset.av || null; renderVerifyMode(c); }; });
    const rs = c.querySelector('[data-x=reset]');
    if (rs) rs.onclick = async () => {
      if (!(await confirmDlg('Clear the “verified” mark on all ' + done + ' transactions in ' + scope + '? (Only clears the checkmark — nothing else changes.)', 'Reset'))) return;
      for (const t of pool) if (t.verified){ delete t.verified; put('txns', t); }
      renderVerifyMode(c);
    };
    const oc = c.querySelector('.month-strip .chip.on');
    if (oc && oc.scrollIntoView) oc.scrollIntoView({ inline: 'center', block: 'nearest' });
  }

  if (!pool.length){
    c.innerHTML = head + '<div class="empty">No transactions in ' + scope + '.</div>';
    bind(); return;
  }
  if (!queue.length){
    c.innerHTML = head + '<div class="empty">✅ Every transaction in ' + scope + ' is verified.</div>';
    bind(); return;
  }
  const t = queue[0];
  const cl = (t.splits && t.splits.length) ? { icon: '🔀', name: t.splits.length + '-way split' } : catLabel(t.cat);
  const dirIn = t.amt > 0;
  c.innerHTML = head +
    '<div class="card review-card">' +
      '<div class="r-amt"' + (dirIn ? ' style="color:var(--status-good)"' : '') + '>' + fmt$(t.amt, { signed: dirIn }) +
        ' <span style="font-size:13px;font-weight:600;color:var(--dim)">' + (dirIn ? 'money IN' : 'money OUT') + '</span></div>' +
      '<div class="r-m">' + esc(t.m) + '</div>' +
      '<div class="tiny" style="overflow-wrap:anywhere">' + esc(t.mraw) + '</div>' +
      '<div class="muted" style="margin-bottom:14px">' + fmtDate(t.date) + ' · ' + esc(accountName(t.acct)) + '</div>' +
      '<div class="card" style="background:var(--card2);margin-bottom:12px"><div class="list-item" data-x="cat" style="padding:6px 2px">' +
        '<span class="ic">' + cl.icon + '</span><div class="body"><div class="t1">' + esc(cl.name) + '</div>' +
        '<div class="t2">Category — tap to change</div></div><span class="menu-chev">›</span></div></div>' +
      (() => {
        // Only prompt about future-estimate inclusion where the answer isn't
        // obvious: income, one-time-eligible categories, or already-overridden.
        const primary = t.cat || (t.splits && t.splits[0] && t.splits[0].cat) || '__uncat';
        const cc = DATA.cats[primary];
        const relevant = (cc && (cc.kind || 'expense') === 'income') || catExcludedFromEstimates(cc) || t.projFuture != null;
        if (!relevant) return '';
        const eff = txnProjects(t, primary);
        return '<div class="row" style="margin-bottom:12px;align-items:center">' +
          '<span class="muted grow" style="font-size:12.5px">Count in future forecast?</span>' +
          '<button class="btn btn-sm' + (eff ? ' btn-primary' : '') + '" data-x="pfin">Yes</button>' +
          '<button class="btn btn-sm' + (!eff ? ' btn-primary' : '') + '" data-x="pfout">No</button></div>';
      })() +
      '<button class="btn btn-primary btn-block" data-x="ok" style="margin-bottom:8px">✓ Looks correct</button>' +
      '<div class="row">' +
        '<button class="btn btn-sm grow" data-x="flip">⇄ Flip in/out</button>' +
        '<button class="btn btn-sm grow" data-x="split">Split…</button>' +
        '<button class="btn btn-sm grow" data-x="edit">Edit…</button>' +
      '</div>' +
      '<div class="row" style="margin-top:8px">' +
        '<button class="btn btn-sm grow" data-x="transfer">Transfer</button>' +
        '<button class="btn btn-sm grow" data-x="excl">Exclude</button>' +
      '</div>' +
    '</div>' +
    '<p class="muted" style="text-align:center">' + queue.length + ' left to verify in ' + scope + '</p>';
  bind();
  const q = (s) => c.querySelector(s);
  const verifyAdvance = () => { t.verified = nowISO(); put('txns', t); renderVerifyMode(c); updateReviewBadge(); };
  q('[data-x=ok]').onclick = verifyAdvance;
  q('[data-x=cat]').onclick = async () => {
    const cat = await openCatPicker({ merchant: t.m, showSystem: true });
    if (!cat) return;
    if (t.splits && t.splits.length){
      if (!(await confirmDlg('Replace the existing split with one category?', 'Replace'))) return;
      t.splits = null;
    }
    t.cat = cat; if (t.status === 'review') t.status = 'ok'; put('txns', t); renderVerifyMode(c);
  };
  q('[data-x=flip]').onclick = () => {
    t.amt = -t.amt;
    if (t.splits) t.splits = t.splits.map((p) => ({ cat: p.cat, amt: -p.amt, note: p.note }));
    put('txns', t); renderVerifyMode(c); toast('Direction flipped');
  };
  q('[data-x=split]').onclick = () => openSplitEditor(t);
  q('[data-x=edit]').onclick = () => openTxnEditor(t.id);
  q('[data-x=transfer]').onclick = () => { t.cat = 'sys-transfer'; t.splits = null; if (t.status === 'review') t.status = 'ok'; put('txns', t); renderVerifyMode(c); };
  q('[data-x=excl]').onclick = () => { t.status = 'excluded'; put('txns', t); renderVerifyMode(c); };
  const pfin = q('[data-x=pfin]'), pfout = q('[data-x=pfout]');
  if (pfin) pfin.onclick = () => { t.projFuture = true; put('txns', t); renderVerifyMode(c); };
  if (pfout) pfout.onclick = () => { t.projFuture = false; put('txns', t); renderVerifyMode(c); };
}

function renderSortMode(c){
  const queue = reviewTxns();
  if (!queue.length){
    REVIEW_SKIP.clear();
    c.innerHTML = '<div class="empty">🎉 All caught up — nothing to sort.<br><span class="tiny">Use “Verify all” to double-check transactions that were auto-categorized.</span></div>';
    return;
  }
  let fresh = queue.filter((t) => !REVIEW_SKIP.has(t.id));
  if (!fresh.length){ REVIEW_SKIP.clear(); fresh = queue; }
  const t = fresh[0];
  let sugg = suggestCats(t.m).slice(0, 4);
  if (!sugg.length) sugg = ['food-gro', 'food-rest', 'sh-house', 'sh-fun'];
  const html =
    '<div class="row" style="margin-bottom:10px"><span class="chip">' + queue.length + ' left</span>' +
    '<div class="grow"></div><button class="btn btn-sm" data-x="skip">Skip ›</button></div>' +
    '<div class="card review-card">' +
      '<div class="r-amt">' + fmt$(t.amt, { signed: t.amt > 0 }) + '</div>' +
      '<div class="r-m">' + esc(t.m) + '</div>' +
      '<div class="tiny" style="overflow-wrap:anywhere">' + esc(t.mraw) + '</div>' +
      '<div class="muted" style="margin-bottom:14px">' + fmtDate(t.date) + ' · ' + esc(accountName(t.acct)) + '</div>' +
      '<label class="row" style="justify-content:center;margin-bottom:10px"><input type="checkbox" data-x="always" checked style="width:auto"> ' +
      '<span class="muted">Always: “' + esc(t.m) + '” → my pick</span></label>' +
      '<div class="cat-grid" style="text-align:left">' + sugg.map((id) => catBtnHTML(id)).join('') +
      '<button class="cat-btn" data-x="more">▦ More…</button></div>' +
      '<div class="row" style="margin-top:12px">' +
        '<button class="btn btn-sm grow" data-x="split">Split…</button>' +
        '<button class="btn btn-sm grow" data-x="transfer">Transfer</button>' +
        '<button class="btn btn-sm grow" data-x="excl">Exclude</button>' +
      '</div>' +
    '</div>' +
    '<p class="muted" style="text-align:center">Tip: you answer once per merchant — rules handle the rest.<br>' +
    '<a data-x="claude" style="cursor:pointer">Bulk triage with Claude →</a></p>';
  c.innerHTML = html;
  const q = (s) => c.querySelector(s);
  function choose(cat){
    if (q('[data-x=always]').checked){
      createRule(t.m, cat);
      t.cat = cat; t.status = 'ok'; put('txns', t);
      const n = reapplyRules();
      if (n) toast('+' + n + ' more auto-sorted');
    } else {
      t.cat = cat; t.status = 'ok'; put('txns', t);
    }
    renderCurrent();
  }
  c.querySelectorAll('[data-cat]').forEach((b) => { b.onclick = () => choose(b.dataset.cat); });
  q('[data-x=more]').onclick = async () => {
    const cat = await openCatPicker({ merchant: t.m, showSystem: true });
    if (cat) choose(cat);
  };
  q('[data-x=skip]').onclick = () => { REVIEW_SKIP.add(t.id); renderReview(); };
  q('[data-x=split]').onclick = () => openSplitEditor(t);
  q('[data-x=transfer]').onclick = () => { t.cat = 'sys-transfer'; t.status = 'ok'; put('txns', t); renderCurrent(); };
  q('[data-x=excl]').onclick = () => { t.status = 'excluded'; put('txns', t); renderCurrent(); };
  q('[data-x=claude]').onclick = () => openScreen('Claude bulk triage', renderClaudeScreen);
}

/* ---- §Activity ---- */
function actFiltered(){
  const q = ACT.q.trim().toUpperCase();
  return liveTxns().filter((t) => {
    if (ACT.acct && t.acct !== ACT.acct) return false;
    if (ACT.month && ymOf(t.date) !== ACT.month) return false;
    if (ACT.status && t.status !== ACT.status) return false;
    if (ACT.cat){
      if (!effParts(t).some((p) => (p.cat || '__uncat') === ACT.cat)) return false;
    }
    if (q && !(t.m.includes(q) || t.mraw.toUpperCase().includes(q) || (t.note || '').toUpperCase().includes(q))) return false;
    return true;
  }).sort((x, y) => (x.date < y.date ? 1 : x.date > y.date ? -1 : 0));
}
// Every month that actually has data, newest first — the source for month
// pickers everywhere (native <input type="month"> is NOT supported on desktop
// browsers, so we never use it).
function dataMonths(){
  return Array.from(new Set(liveTxns().map((t) => ymOf(t.date)))).sort().reverse();
}
// Filter sheet: all Activity filters in one place instead of chip gymnastics.
function openActFilters(){
  const accts = liveAccounts();
  let cat = ACT.cat, status = ACT.status || '';
  const catTxt = (id) => id ? (id === '__uncat' ? '❓ Uncategorized' : catLabel(id).icon + ' ' + catLabel(id).name) : 'All categories';
  const m = modal('Filter activity',
    '<label class="fld"><span>Account</span><select data-x="fa"><option value="">All accounts</option>' +
      accts.map((a) => '<option value="' + esc(a.id) + '"' + (ACT.acct === a.id ? ' selected' : '') + '>' + esc(a.name) + '</option>').join('') + '</select></label>' +
    '<label class="fld"><span>Category</span></label>' +
    '<button class="btn btn-block" data-x="fc" style="text-align:left;margin-bottom:10px">' + esc(catTxt(cat)) + '</button>' +
    '<label class="fld"><span>Month</span><select data-x="fm"><option value="">All months</option>' +
      dataMonths().map((ym) => '<option value="' + ym + '"' + (ACT.month === ym ? ' selected' : '') + '>' + fmtMonth(ym) + '</option>').join('') + '</select></label>' +
    '<label class="fld"><span>Status</span></label>' +
    '<div class="seg" style="margin-bottom:14px">' +
      '<button data-fs="" class="' + (!status ? 'on' : '') + '">All</button>' +
      '<button data-fs="review" class="' + (status === 'review' ? 'on' : '') + '">Needs review</button>' +
      '<button data-fs="excluded" class="' + (status === 'excluded' ? 'on' : '') + '">Excluded</button></div>' +
    '<div class="row"><button class="btn grow" data-x="reset">Reset all</button>' +
    '<button class="btn btn-primary grow" data-x="apply">Apply</button></div>');
  const q2 = (s) => m.node.querySelector(s);
  q2('[data-x=fc]').onclick = async () => {
    const picked = await openCatPicker({ showSystem: true, allowAll: true });
    if (picked){ cat = picked === '__all' ? null : picked; q2('[data-x=fc]').textContent = catTxt(cat); }
  };
  m.node.querySelectorAll('[data-fs]').forEach((b) => {
    b.onclick = () => {
      status = b.dataset.fs;
      m.node.querySelectorAll('[data-fs]').forEach((x) => x.classList.toggle('on', x === b));
    };
  });
  q2('[data-x=reset]').onclick = () => {
    ACT.acct = ACT.cat = ACT.month = ACT.status = null; ACT.limit = 200;
    m.close(); renderActivity();
  };
  q2('[data-x=apply]').onclick = () => {
    ACT.acct = q2('[data-x=fa]').value || null;
    ACT.cat = cat;
    ACT.month = q2('[data-x=fm]').value || null;
    ACT.status = status || null;
    ACT.limit = 200;
    m.close(); renderActivity();
  };
}
function renderActivity(){
  const c = $('#view-activity');
  const catName = ACT.cat ? (ACT.cat === '__uncat' ? 'Uncategorized' : catLabel(ACT.cat).name) : null;
  // Month = the ledger's primary axis: always visible, one tap, no form field.
  const months = dataMonths();
  const nFilters = (ACT.acct ? 1 : 0) + (ACT.cat ? 1 : 0) + (ACT.status ? 1 : 0);
  let html =
    '<div class="row" style="margin-bottom:10px">' +
    '<input type="text" data-x="q" placeholder="Search merchants & notes…" value="' + esc(ACT.q) + '" class="grow">' +
    '<button class="btn btn-sm' + (nFilters ? ' btn-primary' : '') + '" data-x="fopen">Filter' + (nFilters ? ' · ' + nFilters : '') + '</button>' +
    '<button class="btn btn-sm" data-x="fsel">' + (ACT.select ? 'Done' : 'Select') + '</button></div>';
  if (months.length){
    html += '<div class="month-strip">' +
      '<span class="chip' + (!ACT.month ? ' on' : '') + '" data-mstrip="">All</span>' +
      months.map((ym) => '<span class="chip' + (ACT.month === ym ? ' on' : '') + '" data-mstrip="' + ym + '">' + fmtMonth(ym) + '</span>').join('') +
      '</div>';
  }
  if (nFilters){
    html += '<div class="filter-row">' +
      (ACT.acct ? '<span class="chip on" data-clear="acct">' + esc(accountName(ACT.acct)) + '<span class="tag-x">×</span></span>' : '') +
      (ACT.cat ? '<span class="chip on" data-clear="cat">' + esc(catName) + '<span class="tag-x">×</span></span>' : '') +
      (ACT.status ? '<span class="chip on" data-clear="status">' + (ACT.status === 'review' ? 'Needs review' : 'Excluded') + '<span class="tag-x">×</span></span>' : '') +
      (nFilters > 1 ? '<span class="chip" data-clear="__all">Clear all</span>' : '') +
      '</div>';
  }
  html += '<div data-x="list"></div>';
  c.innerHTML = html;
  const q = (s) => c.querySelector(s);

  function drawList(){
    const txns = actFiltered();
    const shown = txns.slice(0, ACT.limit);
    const outS = txns.reduce((s, x) => s + (x.status !== 'excluded' && x.amt < 0 ? -x.amt : 0), 0);
    const inS = txns.reduce((s, x) => s + (x.status !== 'excluded' && x.amt > 0 ? x.amt : 0), 0);
    let lh = shown.length
      ? '<div class="muted" style="margin:0 0 8px">' + txns.length + ' transaction' + (txns.length === 1 ? '' : 's') +
        ' · ' + fmt$(outS) + ' out · ' + fmt$(inS) + ' in</div>'
      : '';
    let lastYM = null;
    for (const t of shown){
      const ym = ymOf(t.date);
      if (ym !== lastYM){
        lastYM = ym;
        const mSpend = txns.reduce((s, x) => s + (ymOf(x.date) === ym && x.status !== 'excluded' && x.amt < 0 ? -x.amt : 0), 0);
        lh += '<div class="group-label row"><span class="grow">' + fmtMonth(ym) + '</span><span>' + fmt$(mSpend) + ' out</span></div>';
      }
      lh += txnRowHTML(t, { select: ACT.select });
    }
    if (!shown.length) lh = '<div class="empty">No matching transactions.</div>';
    if (txns.length > shown.length)
      lh += '<button class="btn btn-block" data-x="morex">Show more (' + (txns.length - shown.length) + ' left)</button>';
    if (ACT.select && ACT.sel.size)
      lh += '<div class="act-bar"><span class="chip">' + ACT.sel.size + '</span>' +
        '<button class="btn btn-sm" data-x="bcat">Categorize</button>' +
        '<button class="btn btn-sm" data-x="bexc">Exclude</button>' +
        '<button class="btn btn-sm btn-danger" data-x="bdel">Delete</button></div>';
    q('[data-x=list]').innerHTML = lh;

    q('[data-x=list]').querySelectorAll('[data-txn]').forEach((n2) => {
      n2.onclick = () => {
        const id = n2.dataset.txn;
        if (ACT.select){
          if (ACT.sel.has(id)) ACT.sel.delete(id); else ACT.sel.add(id);
          drawList();
        } else openTxnEditor(id);
      };
    });
    const on = (sel, fn) => { const n2 = q(sel); if (n2) n2.onclick = fn; };
    on('[data-x=morex]', () => { ACT.limit += 200; drawList(); });
    on('[data-x=bcat]', async () => {
      const cat = await openCatPicker({ showSystem: true });
      if (!cat || cat === '__all' || cat === '__uncat') return;
      for (const id of ACT.sel){
        const t = DATA.txns[id];
        if (!t || t.deleted) continue;
        t.cat = cat; t.splits = null;
        if (t.status === 'review') t.status = 'ok';
        put('txns', t);
      }
      toast(ACT.sel.size + ' categorized');
      ACT.sel.clear(); ACT.select = false; renderCurrent();
    });
    on('[data-x=bexc]', () => {
      for (const id of ACT.sel){
        const t = DATA.txns[id];
        if (!t || t.deleted) continue;
        t.status = 'excluded'; put('txns', t);
      }
      toast(ACT.sel.size + ' excluded');
      ACT.sel.clear(); ACT.select = false; renderCurrent();
    });
    on('[data-x=bdel]', async () => {
      if (!(await confirmDlg('Delete ' + ACT.sel.size + ' transactions? Re-imports will not bring them back.', 'Delete'))) return;
      for (const id of ACT.sel) softDelete('txns', id);
      toast(ACT.sel.size + ' deleted');
      ACT.sel.clear(); ACT.select = false; renderCurrent();
    });
  }

  let qTimer;
  q('[data-x=q]').oninput = (e) => {
    clearTimeout(qTimer);
    qTimer = setTimeout(() => { ACT.q = e.target.value; ACT.limit = 200; drawList(); }, 200);
  };
  q('[data-x=fopen]').onclick = () => openActFilters();
  q('[data-x=fsel]').onclick = () => { ACT.select = !ACT.select; if (!ACT.select) ACT.sel.clear(); renderActivity(); };
  c.querySelectorAll('[data-mstrip]').forEach((ch) => {
    ch.onclick = () => { ACT.month = ch.dataset.mstrip || null; ACT.limit = 200; renderActivity(); };
  });
  const onChip = c.querySelector('.month-strip .chip.on');
  if (onChip && onChip.scrollIntoView) onChip.scrollIntoView({ inline: 'center', block: 'nearest' });
  c.querySelectorAll('[data-clear]').forEach((ch) => {
    ch.onclick = () => {
      if (ch.dataset.clear === '__all') ACT.acct = ACT.cat = ACT.month = ACT.status = null;
      else ACT[ch.dataset.clear] = null;
      renderActivity();
    };
  });
  drawList();
}
/* ---- §Trends ---- */
function barPath(x, yTop, w, hgt, color, opacity){
  if (hgt <= 0.5) return '';
  const r = Math.min(3, w / 2, hgt);
  return '<path d="M' + x.toFixed(1) + ',' + (yTop + hgt).toFixed(1) +
    ' L' + x.toFixed(1) + ',' + (yTop + r).toFixed(1) +
    ' Q' + x.toFixed(1) + ',' + yTop.toFixed(1) + ' ' + (x + r).toFixed(1) + ',' + yTop.toFixed(1) +
    ' L' + (x + w - r).toFixed(1) + ',' + yTop.toFixed(1) +
    ' Q' + (x + w).toFixed(1) + ',' + yTop.toFixed(1) + ' ' + (x + w).toFixed(1) + ',' + (yTop + r).toFixed(1) +
    ' L' + (x + w).toFixed(1) + ',' + (yTop + hgt).toFixed(1) + ' Z" fill="' + color + '" opacity="' + opacity + '"/>';
}
// "Spending vs income" + "Where it goes" cards for the given months (rendered
// on Home, scoped to the selected year). Caller binds taps via [data-m].
function yearChartsHTML(agg, months, sel, baseline){
  const si = months.indexOf(sel);
  const n = months.length;
  const padT = 16, padB = 22, padL = 6, padR = 6;

  /* -- card 1: spending vs income, grouped bars -- */
  const W1 = Math.max(340, n * 42), H1 = 180;
  let maxV = 1;
  for (const ym of months) maxV = Math.max(maxV, agg[ym].spendTotal, agg[ym].incomeTotal);
  if (baseline) maxV = Math.max(maxV, baseline.total);
  const colW = (W1 - padL - padR) / n;
  const yS = (v) => padT + (1 - v / maxV) * (H1 - padT - padB);
  let s1 = '';
  for (let gi = 1; gi <= 3; gi++){
    const gy = yS(maxV * gi / 4).toFixed(1);
    s1 += '<line x1="' + padL + '" y1="' + gy + '" x2="' + (W1 - padR) + '" y2="' + gy + '" stroke="var(--line)"/>';
  }
  const barW = Math.max(4, Math.min(13, (colW - 10) / 2));
  months.forEach((ym, i) => {
    const cx = padL + i * colW + colW / 2;
    const op = ym === sel ? '1' : '0.72';
    const spTop = yS(agg[ym].spendTotal), inTop = yS(agg[ym].incomeTotal);
    s1 += barPath(cx - barW - 1, spTop, barW, H1 - padB - spTop, 'var(--viz-1)', op);
    s1 += barPath(cx + 1, inTop, barW, H1 - padB - inTop, 'var(--viz-2)', op);
    if (n <= 8 || i % 2 === 0 || ym === sel)
      s1 += '<text x="' + cx.toFixed(1) + '" y="' + (H1 - 6) + '" text-anchor="middle" font-size="10" fill="var(--faint)">' + fmtMonth(ym).slice(0, 3) + '</text>';
    if (ym === sel)
      s1 += '<rect x="' + (cx - colW / 2 + 3).toFixed(1) + '" y="' + (H1 - padB + 3) + '" width="' + (colW - 6).toFixed(1) + '" height="2" rx="1" fill="var(--accent)"/>';
    s1 += '<rect data-m="' + ym + '" x="' + (padL + i * colW).toFixed(1) + '" y="0" width="' + colW.toFixed(1) + '" height="' + H1 + '" fill="transparent" style="cursor:pointer"/>';
  });
  if (baseline){
    const by = yS(baseline.total).toFixed(1);
    s1 += '<line x1="' + padL + '" y1="' + by + '" x2="' + (W1 - padR) + '" y2="' + by + '" stroke="var(--faint)" stroke-dasharray="4 3"/>' +
      '<text x="' + (W1 - padR) + '" y="' + (yS(baseline.total) - 4).toFixed(1) + '" text-anchor="end" font-size="9" fill="var(--faint)">baseline</text>';
  }
  const sA = agg[sel];
  const net = sA.incomeTotal - sA.spendTotal;
  const card1 =
    '<div class="card"><h3>Spending vs income</h3>' +
    '<div class="chart-wrap"><svg viewBox="0 0 ' + W1 + ' ' + H1 + '" width="100%" xmlns="http://www.w3.org/2000/svg">' + s1 + '</svg></div>' +
    '<div class="legend"><span><i style="background:var(--viz-1)"></i>Spending</span><span><i style="background:var(--viz-2)"></i>Income</span></div>' +
    '<div class="chart-caption">' + fmtMonth(sel) + ' — Spent ' + fmt$(sA.spendTotal) + ' · Income ' + fmt$(sA.incomeTotal) +
    ' · Net <b style="color:' + (net >= 0 ? 'var(--status-good)' : 'var(--status-crit)') + '">' + fmt$(net, { signed: true }) + '</b></div></div>';

  /* -- card 2: where it goes, top-4 category lines + Other -- */
  const totals = {};
  for (const ym of months) for (const cid in agg[ym].spend) totals[cid] = (totals[cid] || 0) + agg[ym].spend[cid];
  const ranked = Object.keys(totals).filter((k) => totals[k] > 0).sort((a, b) => totals[b] - totals[a]);
  const topIds = ranked.slice(0, 4);
  const series = topIds.map((cid, k) => ({
    name: cid === '__uncat' ? 'Uncategorized' : catLabel(cid).name,
    color: 'var(--viz-' + (k + 1) + ')',
    vals: months.map((ym) => agg[ym].spend[cid] || 0),
  }));
  if (ranked.length > 4) series.push({
    name: 'Other', color: 'var(--viz-other)',
    vals: months.map((ym) => ranked.slice(4).reduce((s, cid) => s + (agg[ym].spend[cid] || 0), 0)),
  });
  let card2 = '';
  if (series.length){
    const GUT = 84;
    const W2 = Math.max(340, n * 40) + GUT, H2 = 180;
    const plotR = W2 - GUT;
    const colW2 = (plotR - padL) / n;
    let sMax = 1;
    for (const se of series) for (const v of se.vals) sMax = Math.max(sMax, v);
    const yL = (v) => padT + (1 - v / sMax) * (H2 - padT - padB);
    const xL = (i) => padL + i * colW2 + colW2 / 2;
    let s2 = '';
    for (let gi = 1; gi <= 3; gi++){
      const gy = yL(sMax * gi / 4).toFixed(1);
      s2 += '<line x1="' + padL + '" y1="' + gy + '" x2="' + plotR + '" y2="' + gy + '" stroke="var(--line)"/>';
    }
    for (const se of series){
      s2 += '<polyline points="' + se.vals.map((v, i) => xL(i).toFixed(1) + ',' + yL(v).toFixed(1)).join(' ') +
        '" fill="none" stroke="' + se.color + '" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
      s2 += '<circle cx="' + xL(si).toFixed(1) + '" cy="' + yL(se.vals[si]).toFixed(1) + '" r="4" fill="' + se.color + '" stroke="var(--card)" stroke-width="2"/>';
    }
    const labels = series.map((se) => ({ name: se.name, color: se.color, y: yL(se.vals[n - 1]) }))
      .sort((a, b) => a.y - b.y);
    for (let i = 1; i < labels.length; i++) if (labels[i].y < labels[i - 1].y + 11) labels[i].y = labels[i - 1].y + 11;
    for (const lb of labels)
      s2 += '<circle cx="' + (plotR + 7) + '" cy="' + (lb.y - 3).toFixed(1) + '" r="3" fill="' + lb.color + '"/>' +
        '<text x="' + (plotR + 14) + '" y="' + lb.y.toFixed(1) + '" font-size="10" fill="var(--dim)">' + esc(lb.name.slice(0, 12)) + '</text>';
    months.forEach((ym, i) => {
      if (n <= 8 || i % 2 === 0 || ym === sel)
        s2 += '<text x="' + xL(i).toFixed(1) + '" y="' + (H2 - 6) + '" text-anchor="middle" font-size="10" fill="var(--faint)">' + fmtMonth(ym).slice(0, 3) + '</text>';
      s2 += '<rect data-m="' + ym + '" x="' + (padL + i * colW2).toFixed(1) + '" y="0" width="' + colW2.toFixed(1) + '" height="' + H2 + '" fill="transparent" style="cursor:pointer"/>';
    });
    card2 = '<div class="card"><h3>Where it goes</h3>' +
      '<div class="chart-wrap"><svg viewBox="0 0 ' + W2 + ' ' + H2 + '" width="100%" xmlns="http://www.w3.org/2000/svg">' + s2 + '</svg></div>' +
      '<div class="legend">' + series.map((se) => '<span><i style="background:' + se.color + '"></i>' + esc(se.name) + '</span>').join('') + '</div>' +
      '<div class="chart-caption">' + fmtMonth(sel) + ' — ' + series.map((se) => esc(se.name) + ' ' + fmt$(se.vals[si])).join(' · ') + '</div></div>';
  }
  return card1 + card2;
}

// "Month vs your baseline" table, used on the Monthly-detail screen.
function monthVsBaselineHTML(agg, ym, baseline){
  if (!baseline)
    return '<div class="card"><h3>Natural budget</h3><p class="muted" style="margin:0">Set your baseline window in ' +
      '<a data-x="gob" style="cursor:pointer">Budgets &amp; Baseline</a> to compare every month against how you naturally spend.</p></div>';
  const sA = agg[ym] || { spend: {} };
  const rows3 = [];
  for (const cat of liveCats()){
    if ((cat.kind || 'expense') !== 'expense') continue;
    const spent = sA.spend[cat.id] || 0;
    const base = baseline.cats[cat.id] || 0;
    if (!spent && !base) continue;
    rows3.push({ name: cat.name, icon: cat.icon, spent, base });
  }
  rows3.sort((a, b) => b.spent - a.spent);
  const tS = rows3.reduce((s, r) => s + r.spent, 0), tB = rows3.reduce((s, r) => s + r.base, 0);
  const dCell = (spent, base) => {
    if (!base) return '<td class="muted" style="text-align:right">—</td>';
    const d = spent - base;
    const col = spent > base * 1.05 ? 'var(--status-crit)' : spent < base ? 'var(--status-good)' : 'var(--dim)';
    return '<td style="text-align:right;color:' + col + '">' + fmt$(d, { signed: true }) + '</td>';
  };
  return '<div class="card"><h3>' + fmtMonth(ym) + ' vs your baseline</h3><div class="tbl-wrap"><table class="map-tbl">' +
    '<tr><th>Category</th><th style="text-align:right">Month</th><th style="text-align:right">Baseline</th><th style="text-align:right">Δ</th></tr>' +
    rows3.map((r) => '<tr><td>' + esc(r.icon || '') + ' ' + esc(r.name) + '</td>' +
      '<td style="text-align:right">' + fmt$(r.spent) + '</td>' +
      '<td style="text-align:right" class="muted">' + (r.base ? fmt$(r.base) : '—') + '</td>' + dCell(r.spent, r.base) + '</tr>').join('') +
    '<tr><td><b>Total</b></td><td style="text-align:right"><b>' + fmt$(tS) + '</b></td>' +
    '<td style="text-align:right"><b>' + fmt$(tB) + '</b></td>' + dCell(tS, tB) + '</tr></table></div>' +
    '<div class="tiny" style="margin-top:6px">Baseline = your typical month, ' + fmtMonth(settings().baselineFrom) + '–' + fmtMonth(settings().baselineTo) + ' (House Setup excluded)</div></div>';
}

  });
  c.querySelectorAll('[data-sug]').forEach((a2) => {
    a2.onclick = () => {
      put('budgets', { id: a2.dataset.sug, amt: sugg.cats[a2.dataset.sug] });
      renderBudgetsScreen(c); toast('Budget set from your actuals');
    };
  });
  const fa = c.querySelector('[data-x=fillall]');
  if (fa) fa.onclick = () => {
    let filled = 0;
    for (const catId in sugg.cats){
      const cat = DATA.cats[catId];
      const g = GROUPS.find((x) => x.id === (cat && cat.group));
      if (g && g.excludeFromBaseline) continue; // one-time groups don't get standing budgets
      const b = DATA.budgets[catId];
      if (b && !b.deleted && b.amt > 0) continue; // never overwrite an explicit budget
      put('budgets', { id: catId, amt: sugg.cats[catId] });
      filled++;
    }
    toast(filled + ' budget' + (filled === 1 ? '' : 's') + ' filled from your actuals');
    renderBudgetsScreen(c);
  };
}

/* ---- Data health screen (statement-coverage audit) ---- */
function renderHealthScreen(c){
  const txns = liveTxns();
  if (!txns.length){ c.innerHTML = '<div class="empty">Nothing imported yet.</div>'; return; }
  const accts = Object.values(DATA.accounts).filter((a) => !a.deleted);
  const rv = reviewTxns().length;
  let html = '<p class="muted" style="margin:0 0 10px">Every account, every month between its first and last transaction. ' +
    '<b>A month with zero transactions almost always means a missing statement</b> — gaps silently skew averages, the baseline and the yearly forecast.</p>' +
    (rv ? '<p class="tiny" style="margin:0 0 10px">Also: ' + rv + ' transactions still in review — unsorted money sits out of all totals until sorted.</p>' : '');

  // Money-in filed under spending categories: each one REDUCES that month's
  // spend by its full amount — the #1 cause of impossible negative months.
  const agg = buildMonthAgg();
  const negMonths = Object.keys(agg).filter((ym) => agg[ym].spendTotal < 0).sort();
  const susp = txns.filter((t) => {
    if (t.status === 'excluded' || t.amt < 10000) return false; // inflows >= $100 only
    return effParts(t).some((p) => p.cat && p.cat !== '__uncat' && catKind(p.cat) === 'expense' && p.amt > 0);
  }).sort((a, b) => b.amt - a.amt);
  if (negMonths.length || susp.length){
    html += '<div class="card" style="border-color:var(--status-crit)"><h3>⚠️ Math-breaking anomalies</h3>' +
      (negMonths.length ? '<p style="margin:0 0 8px">' + negMonths.map(fmtMonth).join(', ') +
        (negMonths.length > 1 ? ' have' : ' has') + ' <b>negative total spending</b>.</p>' : '') +
      (susp.length ? '<p class="muted" style="margin:0 0 8px">These show as <b>money IN</b> but sit in an <b>Expense-type</b> category, so each subtracts from that month. Fixes: ' +
        '(1) if the whole category is really income — e.g. Seed Money — change its <b>Type</b> to Income in Categories &amp; Rules (fixes all at once); ' +
        '(2) if just this item is an inflow, recategorize it; ' +
        '(3) if it was an expense imported backwards, open it and tap <b>⇄ Flip</b>. Small refunds are fine. Tap any to fix:</p>' +
        susp.slice(0, 12).map((t) => txnRowHTML(t)).join('') : '') +
      '</div>';
  }
  for (const a of accts){
    const mine = txns.filter((t) => t.acct === a.id);
    if (!mine.length) continue;
    const byYM = {};
    let minD = null, maxD = null;
    for (const t of mine){
      const ym = ymOf(t.date);
      (byYM[ym] = byYM[ym] || { n: 0, out: 0, inn: 0 }).n++;
      if (t.amt < 0) byYM[ym].out += -t.amt; else byYM[ym].inn += t.amt;
      if (!minD || t.date < minD) minD = t.date;
      if (!maxD || t.date > maxD) maxD = t.date;
    }
    const span = ymRange(ymOf(minD), ymOf(maxD));
    const gaps = span.filter((ym) => !byYM[ym]);
    html += '<div class="card"><h3>' + esc(a.name) + '</h3>' +
      '<p class="tiny" style="margin:0 0 8px">' + minD + ' → ' + maxD + ' · ' + mine.length + ' transactions · ' +
      (gaps.length ? '<b style="color:var(--status-crit)">' + gaps.length + ' gap month' + (gaps.length > 1 ? 's' : '') + ' ⚠️</b>' : 'no gaps ✓') + '</p>' +
      '<div class="tbl-wrap"><table class="map-tbl"><tr><th>Month</th><th style="text-align:right">Txns</th><th style="text-align:right">Out</th><th style="text-align:right">In</th></tr>' +
      span.map((ym) => {
        const b = byYM[ym];
        return b
          ? '<tr><td>' + fmtMonth(ym) + '</td><td style="text-align:right">' + b.n + '</td><td style="text-align:right">' + fmt$(b.out) + '</td><td style="text-align:right">' + fmt$(b.inn) + '</td></tr>'
          : '<tr><td style="color:var(--status-crit)">' + fmtMonth(ym) + '</td><td colspan="3" style="color:var(--status-crit)">⚠️ nothing — missing statement?</td></tr>';
      }).join('') + '</table></div></div>';
  }
  html += '<p class="tiny">Fix a gap by downloading that date range from the bank and importing it — overlapping rows are deduped automatically, so grabbing extra is always safe.</p>';
  c.innerHTML = html;
  c.querySelectorAll('[data-txn]').forEach((n2) => { n2.onclick = () => openTxnEditor(n2.dataset.txn); });
}

      btn.disabled = true; btn.textContent = 'Setting up…';

        await enableSync(p1);

/* ---- Backup screen ---- */
function renderBackupScreen(c){
  c.innerHTML =
    '<div class="card"><h3>Export</h3><p class="muted" style="margin:0 0 10px">Plain-JSON snapshot of everything — keep it somewhere private.</p>' +
    '<button class="btn btn-primary btn-block" data-x="ex">⬇️ Export backup file</button></div>' +
    '<div class="card"><h3>Import</h3><p class="muted" style="margin:0 0 10px">Merge combines with what’s here (newest edit wins). Replace wipes this device first.</p>' +
    '<div class="row"><button class="btn grow" data-x="im">Import & merge</button>' +
    '<button class="btn btn-danger grow" data-x="ir">Replace…</button></div></div>';
  const fi = document.createElement('input');
  fi.type = 'file'; fi.accept = '.json,application/json'; fi.style.display = 'none';
  c.appendChild(fi);
  let mode = 'merge';
  const pick = (m2) => { mode = m2; fi.value = ''; fi.click(); };
  c.querySelector('[data-x=ex]').onclick = () => exportBackup();
  c.querySelector('[data-x=im]').onclick = () => pick('merge');
  c.querySelector('[data-x=ir]').onclick = async () => {
    if (await confirmDlg('Replace ALL data on this device with the backup file?', 'Replace')) pick('replace');
  };
  fi.onchange = async () => {
    const f = fi.files && fi.files[0];
    if (!f) return;
    const r = importBackup(await f.text(), mode);
    if (r.error){ toast(r.error); return; }
    toast('Backup ' + (mode === 'replace' ? 'restored' : 'merged') + ' — ' + r.entities + ' entities');
    renderCurrent();
  };
}

  // actually land on installed PWAs without a manual force-close.
  const hadController = !!navigator.serviceWorker.controller;
  let refreshed = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!hadController || refreshed) return;
    refreshed = true;
    saveNow();
    window.location.reload();
  });
  window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(() => {}); });
  // Resident PWAs never re-navigate on foreground; check for a new sw.js there too.
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) navigator.serviceWorker.getRegistration().then((r) => { if (r) r.update(); });
  });
}

  const pass = localStorage.getItem('nest.pass');
  if (pass) deriveKeys(pass).then((k) => {

    syncPull().then(() => { if (SYNC.dirty) syncPush(); }).catch(() => {});
  });

document.addEventListener('visibilitychange', () => {
  if (document.hidden){ saveNow(); }
  else if (CRYPTO){ SYNC.dirty ? syncPush() : syncPull().catch(() => {}); }
});
